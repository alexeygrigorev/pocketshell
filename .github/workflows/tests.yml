name: Tests

# Issue #41: run JVM unit tests and Testcontainers-driven integration tests
# on every push and pull request. APK builds stay on the tag-only trigger in
# build.yml.

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties', '**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Issue #760: the unit job occasionally failed with ALL visible tests
      # PASSED — a gradle-daemon/runner OOM abort, not a real assertion failure.
      # ubuntu-latest gives 7 GB RAM and 2 cores; unbounded gradle worker fan-out
      # plus an oversized test JVM heap can push the runner into the OOM-killer,
      # which kills the gradle process mid-run AFTER the tests reported green.
      # Bound BOTH the gradle worker count and the JVM heaps so the job stays
      # inside the runner's memory budget: --max-workers=2 matches the 2 vCPUs,
      # and the explicit -Dorg.gradle.jvmargs caps the gradle daemon/launcher
      # heap while -Pkotlin/test forks inherit the project's modest -Xmx. This is
      # infra robustness only — no test is removed, skipped, or weakened.
      - name: Run JVM unit tests
        timeout-minutes: 35
        run: |
          ./gradlew test --no-daemon --stacktrace \
            --max-workers=2 \
            -Dorg.gradle.jvmargs="-Xmx3g -XX:MaxMetaspaceSize=768m -Dfile.encoding=UTF-8"

      - name: Upload unit test reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-reports
          path: |
            **/build/reports/tests/
            **/build/test-results/
          if-no-files-found: ignore

  python:
    name: Python utility tests (pocketshell)
    runs-on: ubuntu-latest

    # Issue #170 (first PR): the unified `pocketshell` server-side
    # utility lives under `tools/pocketshell/` as a standalone Python
    # package. It does not participate in the Gradle build, so a separate
    # CI job exercises its pytest suite. Cheap (~5 s including install)
    # so it runs on every push without gating downstream Android jobs.
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install --upgrade uv

      - name: Install pocketshell + dev deps
        working-directory: tools/pocketshell
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Run pytest
        working-directory: tools/pocketshell
        run: uv run pytest -v

      - name: Smoke-test installed CLI
        working-directory: tools/pocketshell
        run: |
          .venv/bin/pocketshell --version
          .venv/bin/pocketshell --help
          .venv/bin/pocketshell usage --help

  integration:
    name: Integration tests (Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties', '**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # ubuntu-latest runners have Docker preinstalled and the daemon running,
      # which is what Testcontainers needs. Sanity-check before we hand off.
      - name: Verify Docker is available
        run: docker info

      # Issue #691: core-tmux:integrationTest (Testcontainers, no emulator) is
      # added here so the control-mode contract — `tmux -CC` spawns, structural
      # events surface, one-command-at-a-time framing, list-sessions/new-session
      # round-trips — is pinned on EVERY push, not only nightly. Cheap win: it
      # runs on the same plain Docker runner as the other integration tests.
      - name: Run integration tests
        timeout-minutes: 45
        run: ./gradlew :app:integrationTest :shared:core-ssh:integrationTest :shared:core-portfwd:integrationTest :shared:core-tmux:integrationTest --no-daemon --stacktrace

      - name: Upload integration test reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-reports
          path: |
            **/build/reports/tests/
            **/build/test-results/
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Per-push emulator-journey job (issue #691, the #638 mandate that never
  # landed). Runs the LOAD-BEARING terminal-attach/switch JOURNEY proof on the
  # emulator + deterministic Docker `agents:2222` fixture on EVERY push, so the
  # never-black / wrong-session / EOF-on-switch regressions are caught at PR
  # time, not the next morning by nightly or at release by the gate.
  #
  # Issue #710 (RE-ADDED): MultiSessionSwitchJourneyE2eTest is back in this
  # per-push subset. It was quarantined under #691 because it WEDGED on the
  # GitHub android-emulator-runner AVD (rapid A->B->C->A backgrounded a
  # just-switched runtime whose VM-clear park stalled the main thread on an
  # UNBOUNDED `cancelAndJoin()`). #710 bounds that teardown at
  # SYNC_DETACH_TIMEOUT_MS so the main thread is guaranteed to return. The
  # per-push subset is therefore the full A->B->C->A switch journey plus
  # DeepLinkSessionSwitchE2eTest, ColdRestoreGoneSessionNoResurrectE2eTest,
  # ReconnectRepaintE2eTest, and BackgroundGraceReconnectE2eTest (see
  # scripts/ci-journey-suite.sh for the inline note). The suite also passes
  # AndroidJUnitRunner's per-test `timeout_msec` so any future wedge fails fast
  # instead of hanging, and the job `timeout-minutes` below is a 45-min backstop.
  #
  # This is intentionally the FAST subset (scripts/ci-journey-suite.sh), not the
  # full connected suite — the heavy/long-running + toxiproxy network-fault +
  # bootstrap-matrix suites stay in nightly-extensive.yml. The selected proof
  # needs no toxiproxy proxy family, so this job brings up ONLY the
  # deterministic `agents` fixture, keeping it deterministic (the maintainer
  # already gets CI email spam — a flaky per-push job would make that worse).
  emulator-journey:
    name: Emulator journey subset (load-bearing, Docker agents)
    runs-on: ubuntu-latest
    # Issue #691 (STABILIZE): lowered 75 -> 45 as a backstop. A wedging test
    # should now fail fast via the per-test `timeout_msec` in
    # scripts/ci-journey-suite.sh; this job cap only bounds the worst case so a
    # hang can never again burn ~75 min + a failure email on every push.
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties', '**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew + suite script executable
        run: chmod +x ./gradlew scripts/ci-journey-suite.sh

      - name: Verify Docker is available
        run: docker info

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Issue #760: the AVD create intermittently FATAL-ed with
      # "Not enough space to create userdata partition. Available: 6957 MB,
      # need 7372 MB" — pure runner disk pressure, not a test failure. The
      # ubuntu-latest image ships ~30 GB of preinstalled SDKs/toolchains we do
      # not use for this job (.NET, Haskell/GHC, the bundled Android NDK, the
      # large CodeQL/boost caches). Reclaim them BEFORE the emulator-runner
      # creates the AVD so the userdata partition always fits, then print the
      # free space so a future disk regression is visible in the log. The `|| true`
      # guards keep the step green if a path is already gone on a newer image.
      - name: Free disk space for the AVD
        run: |
          echo "::group::Disk before cleanup"
          df -h /
          echo "::endgroup::"
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/lib/android/sdk/ndk || true
          sudo rm -rf /opt/ghc /usr/local/.ghcup || true
          sudo rm -rf /usr/local/share/boost || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo rm -rf "$AGENT_TOOLSDIRECTORY" || true
          sudo docker image prune -af || true
          echo "::group::Disk after cleanup"
          df -h /
          echo "::endgroup::"
          avail_mb="$(df -m --output=avail / | tail -1 | tr -d ' ')"
          echo "Available on / after cleanup: ${avail_mb} MB"
          # The AVD userdata partition needs ~7372 MB; require a safe margin so
          # the create cannot FATAL on disk. If it still can't be freed, fail
          # NOW with an explicit infra classification rather than letting the
          # emulator-runner FATAL deeper in with a confusing message.
          if [[ "$avail_mb" -lt 9000 ]]; then
            echo "::error title=EMULATOR INFRA UNAVAILABLE::Only ${avail_mb} MB free on / after cleanup; the AVD userdata partition needs ~7372 MB. This is a runner-disk infra shortage (issue #760), not a test failure."
            exit 1
          fi

      # Issue #771: since 2026-06-13 the job died inside the emulator-runner
      # action's OWN "Install Android SDK" step — `yes | sdkmanager --licenses`
      # exited 1 BEFORE any AVD/emulator started (the later "could not connect to
      # TCP port 5554" is just the action's cleanup handler, not a boot failure).
      # This is a GitHub hosted-runner SDK-install/license flake we don't control
      # via the action (the floating `v2` tag has NOT moved since v2.37.0 in
      # March, so it is not an action regression). Harden the hosted SDK install
      # BEFORE the action runs so the action's internal `sdkmanager --licenses`
      # is a no-op against an already-accepted, already-warmed SDK:
      #   * ensure cmdline-tools + sdkmanager are on PATH (the hosted image ships
      #     them under $ANDROID_SDK_ROOT/cmdline-tools/latest/bin),
      #   * accept ALL licenses in a retry loop (transient network/license-cache
      #     failures are the documented failure mode here),
      #   * pre-install the exact packages the action would otherwise fetch
      #     (platform-tools, platforms;android-34, the api-34 google_apis x86_64
      #     system image) with retries, so the action's install step finds them
      #     present and cannot fail on a fresh download.
      # The trailing `true` only guards the convenience step: if it still cannot
      # accept here, the action's own license step remains the authoritative gate
      # and a genuine boot/test failure still reddens the job via the classifier
      # below. We never `exit 0` on a real test failure (no #636/#638 false-green).
      - name: Pre-accept Android SDK licenses + warm up SDK (robust, issue #771)
        run: |
          set -u
          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-/usr/local/lib/android/sdk}}"
          echo "Using SDK_ROOT=$SDK_ROOT"
          SDKMANAGER=""
          for cand in \
            "$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            "$SDK_ROOT/cmdline-tools/bin/sdkmanager" \
            "$(command -v sdkmanager 2>/dev/null || true)"; do
            if [[ -n "$cand" && -x "$cand" ]]; then SDKMANAGER="$cand"; break; fi
          done
          if [[ -z "$SDKMANAGER" ]]; then
            echo "::warning title=sdkmanager not found::Could not locate sdkmanager under $SDK_ROOT; leaving license/install to the emulator-runner action."
            exit 0
          fi
          echo "Using sdkmanager: $SDKMANAGER"

          accept_licenses() {
            yes | "$SDKMANAGER" --sdk_root="$SDK_ROOT" --licenses > /dev/null 2>&1
          }
          echo "::group::Accept SDK licenses (retry x5)"
          ok=""
          for attempt in 1 2 3 4 5; do
            if accept_licenses; then ok="yes"; echo "Licenses accepted on attempt $attempt"; break; fi
            echo "License acceptance attempt $attempt failed; retrying in 5s..."
            sleep 5
          done
          if [[ -z "$ok" ]]; then
            echo "::warning title=License pre-accept could not complete::Falling back to the action's internal license step; a real failure will still redden the job."
          fi
          echo "::endgroup::"

          install_pkgs() {
            yes | "$SDKMANAGER" --sdk_root="$SDK_ROOT" \
              "platform-tools" \
              "platforms;android-34" \
              "system-images;android-34;google_apis;x86_64" > /dev/null 2>&1
          }
          echo "::group::Warm up SDK packages (retry x3)"
          for attempt in 1 2 3; do
            if install_pkgs; then echo "SDK packages installed/verified on attempt $attempt"; break; fi
            echo "SDK warm-up attempt $attempt failed; retrying in 10s..."
            sleep 10
          done
          echo "::endgroup::"
          # Convenience step — never let it redden the job; the action + classifier
          # remain the authoritative gate.
          true

      - name: Build SSH base image
        run: docker compose -f tests/docker/docker-compose.yml build sshd

      # The selected journeys (DeepLinkSessionSwitch, MultiSessionSwitch,
      # ColdRestoreGoneSessionNoResurrect, ReconnectRepaint,
      # BackgroundGraceReconnect, plus the share-auth pair ShareTarget +
      # SharePassphraseDialog promoted in #727) all drive the plain deterministic
      # `agents` fixture on host port 2222 (emulator 10.0.2.2:2222) and NONE of
      # them need the opt-in toxiproxy network-fault proxies. Bring up ONLY
      # `agents` so the job is deterministic.
      - name: Start Docker fixture (agents)
        run: |
          docker compose -f tests/docker/docker-compose.yml up -d --build --no-deps agents

      - name: Wait for the agents fixture to report healthy
        run: |
          source tests/docker/lib/wait-for-healthy.sh
          wait_for_container_healthy tests/docker/docker-compose.yml agents /tmp/agents-health.log 60
          cat /tmp/agents-health.log

      - name: Verify agent SSH target tool surface
        run: |
          chmod 600 tests/docker/test_key
          ssh -i tests/docker/test_key -p 2222 \
            -o BatchMode=yes \
            -o ConnectTimeout=2 \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            testuser@127.0.0.1 \
            'for tool in pocketshell agent-log-explorer tmuxctl quse; do command -v "$tool"; done'

      # Issue #760: the journey job intermittently failed with
      # "WARNING | Failed to load snapshot 'default_boot'" followed by
      # "adb … exit code 1" — a STALE/CORRUPT quickboot snapshot the runner
      # tried to restore, so the emulator never reached `device`. Force a clean
      # COLD boot every run so we never depend on a `default_boot` snapshot:
      #   * `force-avd-creation: true`  — recreate the AVD from scratch (no reuse
      #     of a prior, possibly-corrupt AVD/snapshot state).
      #   * `-no-snapshot-load` in emulator-options — never restore quickboot;
      #     boot cold. (`-no-snapshot-save` was already set, so nothing is saved
      #     either — the pair guarantees a deterministic cold boot.)
      #
      # Infra-retry-once (separate from the per-class test retry inside
      # scripts/ci-journey-suite.sh): the FIRST emulator bringup is
      # `continue-on-error`; if it fails (boot/adb infra flake), a SECOND
      # identical bringup runs. The journey TESTS only "really failed" if the
      # second attempt's suite reports failures — a one-off boot flake recovers
      # to green instead of spamming a red-CI email on an inert diff.
      - name: Run load-bearing journey subset on the emulator
        id: journey
        continue-on-error: true
        # Issue #771: pin to the v2.37.0 commit (the floating `v2` tag currently
        # resolves here) so a future surprise bump of the tag can't silently
        # change SDK-install behaviour under us. Today's red was the GitHub
        # hosted-runner SDK/license install (handled by the pre-accept step
        # above), NOT an action regression — this pin is hygiene, not the fix.
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_7
          force-avd-creation: true
          disable-animations: true
          emulator-options: -no-snapshot-save -no-snapshot-load -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -camera-front none
          emulator-boot-timeout: 900
          script: scripts/ci-journey-suite.sh

      # Infra-retry-once: only runs if the first bringup failed (boot/adb infra
      # flake OR a real test failure). A second cold boot recovers a transient
      # emulator-boot flake; a genuine regression fails here too and turns the
      # job red below.
      - name: Retry journey subset on a fresh cold-booted emulator
        id: journey_retry
        if: steps.journey.outcome == 'failure'
        continue-on-error: true
        # Issue #771: same v2.37.0 pin as the first attempt (see note above).
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_7
          force-avd-creation: true
          disable-animations: true
          emulator-options: -no-snapshot-save -no-snapshot-load -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -camera-front none
          emulator-boot-timeout: 900
          script: scripts/ci-journey-suite.sh

      # Classify the final verdict. The job is red ONLY if the retry also failed
      # (or there was no retry because the first run failed but produced no
      # outcome we can trust). A first-attempt failure that the retry recovered
      # is surfaced as an explicit "infra flake recovered" note in the log so a
      # degrading-flake trend stays visible (parity with the suite script's
      # JOURNEY_FLAKE_RECOVERED marker), not silently hidden.
      - name: Classify emulator-journey result (infra-abort vs test-failure)
        if: always()
        run: |
          first="${{ steps.journey.outcome }}"
          retry="${{ steps.journey_retry.outcome }}"
          echo "first attempt outcome:  $first"
          echo "retry attempt outcome:  ${retry:-<skipped>}"
          if [[ "$first" == "success" ]]; then
            echo "Emulator journey passed on the first cold boot."
            exit 0
          fi
          if [[ "$retry" == "success" ]]; then
            echo "::warning title=Emulator infra flake recovered::The first emulator bringup failed but a second cold boot passed (issue #760). Treating as a recovered infra flake, NOT a test failure. Watch for a degrading trend."
            exit 0
          fi
          echo "::error title=Emulator journey FAILED (both attempts)::The journey suite failed on BOTH cold-boot attempts. If the logs show the emulator never reached 'device' (boot/adb infra), this is EMULATOR INFRA UNAVAILABLE; otherwise it is a genuine test failure. See the per-class verdicts in the suite summary above."
          exit 1

      - name: Collect Docker logs
        if: always()
        run: |
          mkdir -p artifacts/docker
          docker compose -f tests/docker/docker-compose.yml ps > artifacts/docker/compose-ps.txt
          docker compose -f tests/docker/docker-compose.yml logs --no-color agents > artifacts/docker/agents.log 2>/dev/null || true
          docker inspect pocketshell-test-agents > artifacts/docker/agents-inspect.json 2>/dev/null || true

      - name: Publish journey suite summary
        if: always()
        run: |
          if [[ -f artifacts/ci-journey/summary.md ]]; then
            cat artifacts/ci-journey/summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "# Per-push CI journey suite — summary"
              echo
              echo "No suite summary was written (the suite script may have aborted before writing it)."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Android test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: emulator-journey-android-test-reports
          path: |
            **/build/reports/androidTests/
            **/build/outputs/androidTest-results/
            **/build/outputs/connected_android_test_additional_output/
            artifacts/ci-journey/
          if-no-files-found: ignore

      - name: Upload Docker logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: emulator-journey-docker-logs
          path: artifacts/docker/
          if-no-files-found: ignore

      - name: Stop Docker fixture
        if: always()
        run: docker compose -f tests/docker/docker-compose.yml down --volumes --remove-orphans
