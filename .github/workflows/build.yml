name: Build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/v') }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties', '**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Generate version
        id: version
        run: |
          TIMESTAMP=$(date +'%Y%m%d-%H%M%S')
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c 1-7)
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="dev-${TIMESTAMP}-${SHORT_SHA}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Rename APK
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mv app/build/outputs/apk/debug/app-debug.apk "app/build/outputs/apk/debug/pocketshell-${VERSION}-debug.apk"

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: pocketshell-${{ steps.version.outputs.version }}-debug.apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            app/build/outputs/apk/debug/*.apk
          generate_release_notes: true

  publish-pypi:
    # Build and publish the `pocketshell` Python package alongside the APK
    # release. Only fires on tag pushes; workflow_dispatch builds are
    # APK-only (matching the existing `Create Release` gate above).
    name: Publish pocketshell to PyPI
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    environment:
      name: pypi
      url: https://pypi.org/p/pocketshell

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify Android versionName matches pyproject.toml and tag
        # Hard cut (D22): publish must abort if the maintainer bumps one
        # version-source-of-truth but forgets the other before tagging.
        run: |
          chmod +x scripts/check-pypi-version.sh
          scripts/check-pypi-version.sh --check-tag "${{ github.ref_name }}"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build backend
        run: python -m pip install --upgrade build

      - name: Build sdist and wheel
        working-directory: tools/pocketshell
        run: python -m build

      - name: Upload built distributions as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: pocketshell-pypi-${{ github.ref_name }}
          path: tools/pocketshell/dist/*
          if-no-files-found: error

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: tools/pocketshell/dist
          password: ${{ secrets.PYPI_API_TOKEN }}
