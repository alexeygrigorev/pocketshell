name: Release Emulator Validation

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: Optional artifact run id suffix. Leave blank for timestamp.
        required: false
        type: string
      terminal_release_gate:
        description: Run optional real-agent terminal release gate.
        required: false
        default: false
        type: boolean

jobs:
  emulator-release-validation:
    name: Emulator-only release validation
    runs-on: ubuntu-latest
    timeout-minutes: 180

    env:
      ANDROID_SDK: /usr/local/lib/android/sdk
      ANDROID_HOME: /usr/local/lib/android/sdk
      RELEASE_VALIDATION_SKIP_MAIN_GUARD: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties', '**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make scripts executable
        run: chmod +x ./gradlew scripts/*.sh

      - name: Verify Docker is available
        run: docker info

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Prepare release validation run id
        id: validation
        env:
          RUN_ID_INPUT: ${{ inputs.run_id }}
        run: |
          if [[ -n "$RUN_ID_INPUT" ]]; then
            RUN_ID="$(printf '%s' "$RUN_ID_INPUT" | tr -cs 'A-Za-z0-9._-' '-')"
            RUN_ID="${RUN_ID#-}"
            RUN_ID="${RUN_ID%-}"
          else
            RUN_ID="gha-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}-$(date +'%Y%m%d-%H%M%S')"
          fi
          if [[ -z "$RUN_ID" ]]; then
            RUN_ID="gha-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}-$(date +'%Y%m%d-%H%M%S')"
          fi
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Run emulator-only release validation
        uses: reactivecircus/android-emulator-runner@v2
        env:
          RUN_ID: ${{ steps.validation.outputs.run_id }}
          ANDROID_SDK: ${{ env.ANDROID_SDK }}
          ADB: ${{ env.ANDROID_SDK }}/platform-tools/adb
          EMULATOR: ${{ env.ANDROID_SDK }}/emulator/emulator
          RELEASE_VALIDATION_SKIP_MAIN_GUARD: ${{ env.RELEASE_VALIDATION_SKIP_MAIN_GUARD }}
          TERMINAL_RELEASE_GATE: ${{ inputs.terminal_release_gate && '1' || '0' }}
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_7
          disable-animations: true
          # Issue #449: pin a GL-robust boot config explicitly instead of
          # relying on the action defaults. swiftshader_indirect is the
          # software GL path the pre-release confidence gate already uses for
          # its own managed-emulator starts, and a longer boot timeout gives a
          # cold runner more slack before the first instrumentation. If a boot
          # still loses GL init ('Failed to initialize 101010-2 format' ->
          # "No compose hierarchies found"), the gate cold-reboots the emulator
          # in-script and retries the affected selector on a fresh EGL surface.
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -camera-front none
          emulator-boot-timeout: 900
          script: scripts/release-emulator-validation.sh

      - name: Publish validation summary
        if: always()
        run: |
          summary="build/release-emulator-validation/${{ steps.validation.outputs.run_id }}/summary.md"
          if [[ -f "$summary" ]]; then
            cat "$summary" >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "# PocketShell Release Emulator Validation"
              echo
              echo "No release validation summary was written."
              echo
              echo "Expected: \`$summary\`"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload release validation artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-emulator-validation-${{ steps.validation.outputs.run_id }}
          path: |
            build/release-emulator-validation/${{ steps.validation.outputs.run_id }}/
            build/terminal-workbench/${{ steps.validation.outputs.run_id }}-terminal-release/
            build/pre-release-confidence-gate/${{ steps.validation.outputs.run_id }}-pre-release/
            !build/pre-release-confidence-gate/${{ steps.validation.outputs.run_id }}-pre-release/worktree/
            build/phone-walkthrough/${{ steps.validation.outputs.run_id }}-terminal-lab/
            build/phone-walkthrough/${{ steps.validation.outputs.run_id }}-tmux-existing-session/
            build/phone-walkthrough/${{ steps.validation.outputs.run_id }}-setup-detection/
            build/walkthrough-visual-pass/${{ steps.validation.outputs.run_id }}-visual-audit/
            **/build/reports/
            **/build/test-results/
            **/build/outputs/androidTest-results/
            **/build/outputs/connected_android_test_additional_output/
          if-no-files-found: ignore

      - name: Stop Docker targets
        if: always()
        run: |
          docker compose -f tests/docker/docker-compose.yml down --volumes --remove-orphans
          docker compose -f tests/docker/real-agent/compose.yml down --volumes --remove-orphans || true
