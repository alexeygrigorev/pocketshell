name: Tests

# Issue #41: run JVM unit tests and Testcontainers-driven integration tests
# on every push and pull request. APK builds stay on the tag-only trigger in
# build.yml.

on:
  push:
  pull_request:

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties', '**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run JVM unit tests
        run: ./gradlew test --stacktrace

      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: |
            **/build/reports/tests/
            **/build/test-results/
          if-no-files-found: ignore

  integration:
    name: Integration tests (Docker)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties', '**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # ubuntu-latest runners have Docker preinstalled and the daemon running,
      # which is what Testcontainers needs. Sanity-check before we hand off.
      - name: Verify Docker is available
        run: docker info

      - name: Run integration tests
        run: ./gradlew :shared:core-ssh:integrationTest :shared:core-portfwd:integrationTest --stacktrace

      - name: Upload integration test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-reports
          path: |
            **/build/reports/tests/
            **/build/test-results/
          if-no-files-found: ignore

  emulator:
    name: Emulator smoke (Docker agents)
    runs-on: ubuntu-latest
    needs: [unit, integration]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties', '**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Verify Docker is available
        run: docker info

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Start Docker agent target
        run: docker compose -f tests/docker/docker-compose.yml up -d --build agents

      - name: Wait for agent container to report healthy
        # Issue #150: consume the compose `healthcheck:` block via
        # `docker inspect` instead of retry-sleep polling SSH from the
        # host. The compose service runs `ssh ... testuser@localhost
        # true` inside the container; reaching `healthy` means SSH +
        # authentication are working.
        run: |
          source tests/docker/lib/wait-for-healthy.sh
          wait_for_container_healthy tests/docker/docker-compose.yml agents /tmp/agent-health.log 60
          cat /tmp/agent-health.log

      - name: Verify agent SSH target tool surface
        # Health-status already proves SSH is up; this single SSH probe
        # only verifies the agent-image-specific tool surface remained
        # intact for the connected suite.
        run: |
          chmod 600 tests/docker/test_key
          ssh -i tests/docker/test_key -p 2222 \
            -o BatchMode=yes \
            -o ConnectTimeout=2 \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            testuser@127.0.0.1 \
            'for tool in heru agent-log-explorer tmuxctl; do command -v "$tool"; done'

      - name: Run connected Android tests
        # `-Pandroid.testInstrumentationRunnerArguments.pocketshellCi=true`
        # is read by `TerminalTestTimeouts` (see
        # `app/src/androidTest/java/com/pocketshell/app/proof/TerminalTestTimeouts.kt`)
        # so emulator-smoke terminal waits use a generous CI deadline
        # (180 s) without changing local feedback (60 s). The
        # instrumentation runs on the device, so host env vars like
        # `CI=true` are NOT visible to test code — gradle runner-args
        # are the supported propagation channel.
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_7
          disable-animations: true
          script: ./gradlew connectedDebugAndroidTest -Pandroid.testInstrumentationRunnerArguments.pocketshellCi=true --stacktrace

      - name: Collect Docker logs
        if: always()
        run: |
          mkdir -p artifacts/docker
          docker compose -f tests/docker/docker-compose.yml ps > artifacts/docker/compose-ps.txt
          docker compose -f tests/docker/docker-compose.yml logs --no-color agents > artifacts/docker/agents.log
          docker inspect pocketshell-test-agents > artifacts/docker/agents-inspect.json 2>/dev/null || true

      - name: Upload Android test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: emulator-android-test-reports
          path: |
            **/build/reports/androidTests/
            **/build/outputs/androidTest-results/
            **/build/outputs/connected_android_test_additional_output/
          if-no-files-found: ignore

      - name: Upload Docker logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: emulator-docker-logs
          path: artifacts/docker/
          if-no-files-found: ignore

      - name: Stop Docker agent target
        if: always()
        run: docker compose -f tests/docker/docker-compose.yml down --volumes --remove-orphans
