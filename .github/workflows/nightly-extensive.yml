name: Nightly Extensive Tests

# Issue #659 (epic #657): a NIGHTLY, CONDITIONAL, EXTENSIVE emulator + Docker
# journey/E2E run. This is NOT a per-push gate — the per-push unit + Docker
# integration jobs stay in tests.yml. This workflow exists so the user-journey
# regressions (reconnect / terminal repaint / share-auth / tmux-switch /
# network-fault) that merge green on the cheap per-push gate are caught the
# next morning instead of at release time.
#
# Key behaviours:
#   1. Scheduled nightly via cron.
#   2. A guard step skips the expensive emulator/Docker suite entirely when
#      there are NO new commits on `main` in the last 24h (so an idle repo
#      does not burn a long, flaky emulator runner). A manual run via
#      workflow_dispatch always bypasses the guard (force-run).
#   3. When it runs, it executes the FULL connected journey/E2E suite on the
#      emulator + Docker `agents:2222`, PLUS the toxiproxy network-fault proofs
#      (network-fault-proxy / packet-loss-proxy) un-gated, PLUS a trimmed
#      bootstrap setup-scenario matrix (issue #667: ready + uvInstall +
#      appUpdateRequired against bootstrap-*:2230/2231/2236) so the first-run
#      install / app-update setup journeys are guarded nightly, not only by the
#      release gate — release-validation-level coverage.
#
# This subsumes the old "Emulator Smoke" nightly job and #660 (the standalone
# network-fault job folds in here).

on:
  workflow_dispatch:
    inputs:
      force_run:
        description: Run the extensive suite even with no new commits in 24h.
        required: false
        default: true
        type: boolean
  schedule:
    # Nightly at 02:17 UTC (kept from the previous Emulator Smoke cron so the
    # nightly slot does not move).
    - cron: "17 2 * * *"

# Never let two nightly extensive runs (e.g. a cron run and a manual force-run)
# fight over the long emulator job at the same time.
concurrency:
  group: nightly-extensive
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Guard: decide whether the expensive suite should run at all. This job is
  # cheap (checkout + a couple of git commands, no JDK/Docker/emulator) so an
  # idle repo costs ~seconds rather than spinning up a long emulator runner.
  # ---------------------------------------------------------------------------
  guard:
    name: Guard (new commits in last 24h?)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}
      reason: ${{ steps.decide.outputs.reason }}
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v6
        with:
          # The guard counts commits in a time window, so it needs real
          # history, not the default depth-1 shallow checkout.
          fetch-depth: 0
          ref: main

      # Issue #1201: validate the release-gate fault-verdict decision logic on
      # every nightly/dispatch (cheap, no network). The helper self-test proves
      # the verdict is computed from the network-fault + bootstrap phases ONLY
      # (journey suite + #822 expected-fail lane excluded); the guard self-test
      # proves the release-gate guard GREENs on a fault-verdict-green run (even
      # with an unrelated red shard) and REDs on a fault-verdict-red run.
      - name: "Self-test the fault-verdict logic (issue #1201)"
        run: |
          chmod +x scripts/lib/nightly-fault-verdict.sh scripts/check-nightly-fault-run.sh
          scripts/lib/nightly-fault-verdict.sh --self-test
          scripts/check-nightly-fault-run.sh --self-test

      - name: Decide whether to run the extensive suite
        id: decide
        env:
          # A manual workflow_dispatch always force-runs unless the operator
          # explicitly unticks force_run. Scheduled runs leave this empty and
          # fall through to the 24h-new-commits check.
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.force_run }}
        run: |
          set -euo pipefail

          if [[ "$FORCE_RUN" == "true" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "reason=manual force-run (workflow_dispatch, force_run=true)" >> "$GITHUB_OUTPUT"
            echo "Manual force-run requested; bypassing the 24h-new-commits guard."
            exit 0
          fi

          # Count commits landed on the checked-out main HEAD within the last
          # 24h. `git rev-list --count --since` is deterministic and does not
          # depend on the GitHub API or its rate limits.
          recent_count="$(git rev-list --count --since='24 hours ago' HEAD)"
          head_sha="$(git rev-parse HEAD)"
          echo "main HEAD = $head_sha"
          echo "commits on main in the last 24h = $recent_count"

          if [[ "$recent_count" -gt 0 ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "reason=$recent_count new commit(s) on main in the last 24h" >> "$GITHUB_OUTPUT"
            echo "New commits detected; the extensive suite will run."
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "reason=no new commits on main in the last 24h" >> "$GITHUB_OUTPUT"
            echo "No new commits on main in the last 24h; skipping the expensive suite."
          fi

      - name: Publish guard decision
        run: |
          {
            echo "# Nightly Extensive — guard decision"
            echo
            echo "- event: \`${{ github.event_name }}\`"
            echo "- should_run: \`${{ steps.decide.outputs.should_run }}\`"
            echo "- reason: ${{ steps.decide.outputs.reason }}"
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Extensive suite: full emulator + Docker journey/E2E run + un-gated
  # toxiproxy network-fault proofs + trimmed bootstrap setup-scenario matrix.
  # Only runs when the guard says so.
  # ---------------------------------------------------------------------------
  extensive:
    name: "Extensive journey/E2E + network-fault + bootstrap (shard ${{ matrix.shard }})"
    needs: guard
    if: needs.guard.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    # SHARD (issue #835 follow-up): the full connected suite is ~680 tests and
    # could NOT finish serially on ONE swiftshader AVD inside this ceiling
    # (a triage run reached only 544/683 at the 150-min timeout, so phases 2 & 3
    # never ran and the release gate kept reporting phantom failures). Fan the
    # job out across a matrix of runners — each its OWN cold-booted emulator +
    # Docker fixtures — so each leg runs only its round-robin 1/N slice of phase
    # 1 (the suite reads POCKETSHELL_NIGHTLY_SHARD_INDEX/_TOTAL and hands them to
    # AndroidJUnitRunner numShards/shardIndex). Each leg now finishes well inside
    # the 150-min cap. `fail-fast: false` so one shard's failure does not cancel
    # the others (we want every shard's verdict).
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2]
    env:
      # Set by the matrix; the suite partitions the phase-1 selection round-robin
      # by (shardIndex % numShards). Keep _TOTAL in sync with matrix.shard length.
      # Phases 2 (network-fault) & 3 (bootstrap) run ONCE, on shard 0 only.
      POCKETSHELL_NIGHTLY_SHARD_INDEX: ${{ matrix.shard }}
      POCKETSHELL_NIGHTLY_SHARD_TOTAL: 3
    timeout-minutes: 150
    # Long and historically flaky; keep it non-blocking so a single flaky
    # emulator boot does not poison the nightly signal. Failures still show in
    # the run summary and uploaded artifacts.
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties', '**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew + suite script executable
        run: chmod +x ./gradlew scripts/nightly-extensive-suite.sh

      - name: Verify Docker is available
        run: docker info

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Build SSH base image
        run: docker compose -f tests/docker/docker-compose.yml build sshd

      # The extensive run brings up the journey fixtures (agents, flaky-agent,
      # tmux) AND the toxiproxy proxies (network-fault-proxy, packet-loss-proxy)
      # that the per-push and smoke jobs deliberately leave down. The proxies
      # forward to `agents`, so they `depends_on: agents` in compose.
      #
      # It ALSO brings up the bootstrap setup fixtures the trimmed scenario
      # matrix needs (issue #667): bootstrap-ready (2230), bootstrap-uv-install
      # (2231), and bootstrap-uv-upgrade (2236, reused by the appUpdateRequired
      # scenario). HostBootstrapScenarioSuiteTest connects to these by host port
      # (10.0.2.2:2230/2231/2236), so they must be up before the emulator runs.
      #
      # It ALSO brings up the deterministic `agents-old-cli` (2238, issue #849)
      # and `agents-daemon` (2239, issue #839) fixtures. The phase-1 connected
      # suite includes FolderListOldCliHydrateDockerTest +
      # FolderListBootstrapSkipTreeLoadsDockerTest (2238) and
      # FolderListDurableTreeDaemonDockerTest (2239) — those tests target the
      # fixtures by host port and FAIL hard ("SSH fixture on 10.0.2.2:223x was
      # not ready") if the port is unforwarded, which is exactly the phantom
      # failure this workflow used to produce by NOT starting them. They can land
      # on ANY shard (round-robin), so every shard starts them. This mirrors how
      # the per-push emulator-journey job (.github/workflows/tests.yml) and the
      # release gate (scripts/pre-release-confidence-gate.sh) wire them.
      - name: Start Docker fixtures (agents, flaky-agent, tmux + toxiproxy + bootstrap + old-cli + daemon)
        run: |
          docker compose -f tests/docker/docker-compose.yml up -d --build --no-deps \
            agents flaky-agent tmux network-fault-proxy packet-loss-proxy \
            bootstrap-ready bootstrap-uv-install bootstrap-uv-upgrade \
            agents-old-cli agents-daemon

      - name: Wait for fixture containers to report healthy
        run: |
          source tests/docker/lib/wait-for-healthy.sh
          wait_for_container_healthy tests/docker/docker-compose.yml agents /tmp/agents-health.log 60
          cat /tmp/agents-health.log
          wait_for_container_healthy tests/docker/docker-compose.yml flaky-agent /tmp/flaky-agent-health.log 60
          cat /tmp/flaky-agent-health.log
          wait_for_container_healthy tests/docker/docker-compose.yml tmux /tmp/tmux-health.log 60
          cat /tmp/tmux-health.log
          # Bootstrap setup fixtures for the trimmed scenario matrix (issue #667).
          wait_for_container_healthy tests/docker/docker-compose.yml bootstrap-ready /tmp/bootstrap-ready-health.log 60
          cat /tmp/bootstrap-ready-health.log
          wait_for_container_healthy tests/docker/docker-compose.yml bootstrap-uv-install /tmp/bootstrap-uv-install-health.log 60
          cat /tmp/bootstrap-uv-install-health.log
          wait_for_container_healthy tests/docker/docker-compose.yml bootstrap-uv-upgrade /tmp/bootstrap-uv-upgrade-health.log 60
          cat /tmp/bootstrap-uv-upgrade-health.log
          # Old-CLI (2238, #849) + daemon (2239, #839) fixtures: the phase-1
          # FolderList*DockerTest journeys target these by host port and fail
          # hard when the port is unforwarded, so wait on them before handing off
          # to the emulator (this is the fix for the "SSH fixture on
          # 10.0.2.2:223x was not ready after ~35 attempts" phantom failures).
          wait_for_container_healthy tests/docker/docker-compose.yml agents-old-cli /tmp/agents-old-cli-health.log 60
          cat /tmp/agents-old-cli-health.log
          wait_for_container_healthy tests/docker/docker-compose.yml agents-daemon /tmp/agents-daemon-health.log 60
          cat /tmp/agents-daemon-health.log

      # toxiproxy / packet-loss-proxy do not expose a Docker healthcheck, so
      # poll their listening ports directly before handing off to the emulator.
      - name: Wait for toxiproxy proxies to accept connections
        run: |
          set -euo pipefail
          # Toxiproxy HTTP control API (8474) + the SSH forward (2228), and the
          # packet-loss proxy SSH forward (2229).
          for hostport in 127.0.0.1:8474 127.0.0.1:2228 127.0.0.1:2229; do
            host="${hostport%:*}"
            port="${hostport#*:}"
            echo "Waiting for $host:$port ..."
            for attempt in $(seq 1 60); do
              if timeout 1 bash -c "exec 3<>/dev/tcp/$host/$port" 2>/dev/null; then
                echo "  $host:$port is accepting connections (attempt $attempt)"
                break
              fi
              if [[ "$attempt" -eq 60 ]]; then
                echo "  timed out waiting for $host:$port" >&2
                docker compose -f tests/docker/docker-compose.yml ps
                exit 1
              fi
              sleep 1
            done
          done

      - name: Verify agent SSH target tool surface
        run: |
          chmod 600 tests/docker/test_key
          ssh -i tests/docker/test_key -p 2222 \
            -o BatchMode=yes \
            -o ConnectTimeout=2 \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            testuser@127.0.0.1 \
            'for tool in pocketshell agent-log-explorer tmuxctl quse; do command -v "$tool"; done'

      # Confirm the 2238 fixture really IS an old CLI (rejects `tree` with a
      # non-zero exit) while staying live (tmux works), so the regression tests
      # exercise the real CLI-mismatch path and never pass vacuously against a
      # fixture that silently accepted the new subcommand (mirrors tests.yml #849).
      - name: Verify agents-old-cli is a CLI mismatch (issue #849)
        run: |
          chmod 600 tests/docker/test_key
          ssh -i tests/docker/test_key -p 2238 \
            -o BatchMode=yes \
            -o ConnectTimeout=3 \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            testuser@127.0.0.1 \
            'pocketshell tree get </dev/null; rc=$?; if [ "$rc" -eq 0 ]; then echo "old-cli fixture unexpectedly accepted tree get (rc=0)" >&2; exit 1; fi; tmux -V >/dev/null && echo "old-cli mismatch confirmed: tree get rc=$rc, host still live"'

      # Confirm the 2239 fixture really IS the REAL daemon: `pocketshell tree`
      # round-trips a persist (upsert then get over a fresh exec returns the
      # collapsed node). A broken fixture fails the job loudly here instead of
      # letting the durable-tree journey pass vacuously (mirrors tests.yml #839).
      - name: Verify agents-daemon real `pocketshell tree` persists (issue #839)
        run: |
          chmod 600 tests/docker/test_key
          ssh -i tests/docker/test_key -p 2239 \
            -o BatchMode=yes \
            -o ConnectTimeout=3 \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            testuser@127.0.0.1 \
            'set -e;
             printf "%s" "{\"host\":\"ci\",\"nodes\":[{\"session\":\"s\",\"order\":0,\"folder_path\":\"/p\",\"collapsed\":true}]}" | pocketshell tree upsert >/dev/null;
             got="$(printf "%s" "{\"host\":\"ci\"}" | pocketshell tree get)";
             echo "$got" | grep -q "\"session\": \"s\"" || { echo "agents-daemon tree did NOT persist: $got" >&2; exit 1; };
             echo "$got" | grep -q "\"collapsed\": true" || { echo "agents-daemon tree dropped the collapse: $got" >&2; exit 1; };
             echo "agents-daemon real-tree persist confirmed: $got"'

      - name: Run extensive connected journey/E2E + network-fault + bootstrap scenarios
        uses: reactivecircus/android-emulator-runner@v2
        with:
          # API 35 (Android 15): the full connected suite includes two API-35
          # evidence tests (BoundedGraceSessionHoldJourneyE2eTest +
          # SessionConnectionServiceE2eTest) that HARD-assert
          # Build.VERSION.SDK_INT == 35 ("API 35 evidence must run on Android
          # 15"). Running the API-34 image made them report phantom failures
          # ("expected:<35> but was:<34>"). No test in the suite hard-requires
          # API 34 (the others use `>=` comparisons), so pin API 35 here to match
          # what these tests require. (Per-push / release-gate jobs run their
          # narrower allowlists on API 34 separately.)
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_7
          disable-animations: true
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -camera-front none
          emulator-boot-timeout: 900
          script: scripts/nightly-extensive-suite.sh

      - name: Collect Docker logs
        if: always()
        run: |
          mkdir -p artifacts/docker
          docker compose -f tests/docker/docker-compose.yml ps > artifacts/docker/compose-ps.txt
          docker compose -f tests/docker/docker-compose.yml logs --no-color agents > artifacts/docker/agents.log
          docker compose -f tests/docker/docker-compose.yml logs --no-color flaky-agent > artifacts/docker/flaky-agent.log 2>/dev/null || true
          docker compose -f tests/docker/docker-compose.yml logs --no-color tmux > artifacts/docker/tmux.log 2>/dev/null || true
          docker compose -f tests/docker/docker-compose.yml logs --no-color network-fault-proxy > artifacts/docker/network-fault-proxy.log 2>/dev/null || true
          docker compose -f tests/docker/docker-compose.yml logs --no-color packet-loss-proxy > artifacts/docker/packet-loss-proxy.log 2>/dev/null || true
          docker compose -f tests/docker/docker-compose.yml logs --no-color bootstrap-ready > artifacts/docker/bootstrap-ready.log 2>/dev/null || true
          docker compose -f tests/docker/docker-compose.yml logs --no-color bootstrap-uv-install > artifacts/docker/bootstrap-uv-install.log 2>/dev/null || true
          docker compose -f tests/docker/docker-compose.yml logs --no-color bootstrap-uv-upgrade > artifacts/docker/bootstrap-uv-upgrade.log 2>/dev/null || true
          docker compose -f tests/docker/docker-compose.yml logs --no-color agents-old-cli > artifacts/docker/agents-old-cli.log 2>/dev/null || true
          docker compose -f tests/docker/docker-compose.yml logs --no-color agents-daemon > artifacts/docker/agents-daemon.log 2>/dev/null || true
          docker inspect pocketshell-test-agents > artifacts/docker/agents-inspect.json 2>/dev/null || true
          docker inspect pocketshell-test-agents-old-cli > artifacts/docker/agents-old-cli-inspect.json 2>/dev/null || true
          docker inspect pocketshell-test-agents-daemon > artifacts/docker/agents-daemon-inspect.json 2>/dev/null || true

      - name: Publish extensive suite summary
        if: always()
        run: |
          if [[ -f artifacts/nightly-extensive/summary.md ]]; then
            cat artifacts/nightly-extensive/summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "# Nightly Extensive — suite summary"
              echo
              echo "No suite summary was written (the suite script may have aborted before writing it)."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Android test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          # Per-shard name: upload-artifact@v7 errors on a duplicate artifact
          # name across matrix legs, so each shard uploads its own.
          name: nightly-extensive-android-test-reports-shard-${{ matrix.shard }}
          path: |
            **/build/reports/androidTests/
            **/build/outputs/androidTest-results/
            **/build/outputs/connected_android_test_additional_output/
            artifacts/nightly-extensive/
          if-no-files-found: ignore

      - name: Upload Docker logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nightly-extensive-docker-logs-shard-${{ matrix.shard }}
          path: artifacts/docker/
          if-no-files-found: ignore

      # Issue #1201: the authoritative machine-readable fault-injection safety
      # verdict is written ONLY by the shard that runs the aux fault phases
      # (network-fault + bootstrap), i.e. shard 0. Upload it under a stable,
      # dedicated name so the separate `Fault-injection safety verdict` job can
      # download and evaluate it, independent of the whole flaky extensive shard.
      - name: Upload fault-injection safety verdict (shard 0 only)
        if: always() && matrix.shard == 0
        uses: actions/upload-artifact@v7
        with:
          name: nightly-extensive-fault-verdict
          path: artifacts/nightly-extensive/fault-verdict.txt
          if-no-files-found: ignore

      - name: Stop Docker fixtures
        if: always()
        run: docker compose -f tests/docker/docker-compose.yml down --volumes --remove-orphans

  # ---------------------------------------------------------------------------
  # Fault-injection safety verdict (issue #1201) — the RELEASE-GATING signal.
  #
  # The extensive shard job is `continue-on-error` and mixes the flaky journey
  # suite + the #822 expected-fail lane with the actual fault suite, so its job
  # conclusion is essentially never `success` and can't gate a release. This
  # cheap job instead reads the machine-readable verdict the suite wrote from the
  # network-fault + bootstrap phases ONLY, and turns it into a clean job
  # conclusion. `scripts/check-nightly-fault-run.sh` reads THIS job's conclusion
  # (JOB_NEEDLE="Fault-injection safety verdict"), NOT the mixed extensive job.
  #
  # It is intentionally NOT `continue-on-error`: a red fault phase (or a shard-0
  # crash that produced no verdict — genuine nightly-infra breakage, the #1056
  # escape-hatch case) leaves this job red so the release gate blocks.
  # ---------------------------------------------------------------------------
  fault-verdict:
    name: Fault-injection safety verdict (release gate)
    needs: [guard, extensive]
    # `extensive` is continue-on-error, so it counts as success for `needs`; run
    # whenever the guard decided to run the suite (and even if a shard cancelled,
    # so we still evaluate any verdict shard 0 produced).
    if: always() && needs.guard.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download fault-injection verdict (shard 0)
        uses: actions/download-artifact@v5
        continue-on-error: true
        with:
          name: nightly-extensive-fault-verdict
          path: fault-verdict

      - name: Evaluate fault-injection safety verdict
        run: |
          set -uo pipefail
          file="fault-verdict/fault-verdict.txt"

          if [[ ! -f "$file" ]]; then
            {
              echo "# Fault-injection safety verdict"
              echo
              echo "**BLOCK** — no verdict artifact was produced."
              echo
              echo "Shard 0 did not write \`fault-verdict.txt\` (the fault phase did"
              echo "not complete — most likely genuine nightly-infra breakage such as"
              echo "an emulator boot / Docker-fixture failure). There is NO fault"
              echo "signal to release on. Investigate the shard-0 logs; if it is"
              echo "genuine infra breakage, re-run the nightly, or use the #1056"
              echo "escape hatch (NIGHTLY_FAULT_GATE_DISABLED=1) for a deliberately"
              echo "infra-waived release."
            } | tee -a "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo "Verdict artifact contents:"
          cat "$file"
          echo

          verdict="$(grep -E '^fault_verdict=' "$file" | head -1 | cut -d= -f2)"
          nf="$(grep -E '^network_fault_status=' "$file" | head -1 | cut -d= -f2)"
          bootstrap="$(grep -E '^bootstrap_status=' "$file" | head -1 | cut -d= -f2)"
          expectedfail="$(grep -E '^expected_fail_status=' "$file" | head -1 | cut -d= -f2)"

          {
            echo "# Fault-injection safety verdict"
            echo
            echo "- network-fault (GATING): \`$nf\`"
            echo "- bootstrap (GATING): \`$bootstrap\`"
            echo "- #822 expected-fail lane (NON-GATING, tracked only): \`$expectedfail\`"
            echo "- **fault_verdict: \`$verdict\`**"
          } | tee -a "$GITHUB_STEP_SUMMARY"

          if [[ "$verdict" == "PASS" ]]; then
            echo "PASS: the fault-injection safety journeys (network-fault + bootstrap) passed on this HEAD."
            exit 0
          fi
          echo "BLOCK: fault_verdict=$verdict — a fault-injection safety phase failed on this HEAD."
          exit 1
