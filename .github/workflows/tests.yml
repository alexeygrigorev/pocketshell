name: Tests

# Issue #41: run JVM unit tests and Testcontainers-driven integration tests.
# Issue #816/#953: PRs run the cheap merge gate; Docker/emulator validation is
# batched on main pushes or manual dispatch so every trivial/independent PR does
# not sit in the heavy runner queue. The main-push concurrency group cancels
# older in-flight runs when newer merges land, so the newest main commit becomes
# the current batch head. APK builds stay on the tag-only trigger in build.yml.

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "chat/**"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "chat/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || format('ref-{0}', github.ref) }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties', '**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Issue #657 (F4): test-validity grep-guard. Flags the highest-signal
      # test anti-patterns the #657 audit catalogued — chiefly an IME/keyboard/
      # geometry assertion gated behind an `assumeTrue(...)` self-skip, which on
      # the CI swiftshader AVD silently does NOT run (the real soft IME often
      # never raises), so the test passes vacuously and an on-device regression
      # ships green. The guard hard-fails ONLY on a NEW unjustified occurrence
      # (a small baseline allowlists the catalogued-but-not-yet-rewritten cases,
      # and an inline `// JUSTIFIED:` comment opts a legitimate non-IME guard
      # out), so it adds protection without reddening CI for tests it is not its
      # job to fix. Cheap (< 1 s grep), runs BEFORE the Gradle test step. This is
      # the machine backstop for the process.md "Regression-proof validity rules"
      # (F2/F3) so the rule does not rely solely on reviewer memory. Additive —
      # it does not touch the existing Unit/Python/Integration/emulator jobs.
      - name: Test-validity guard (issue #657)
        run: |
          chmod +x scripts/check-test-validity.sh
          scripts/check-test-validity.sh

      # Issue #848: per-push journey harness guard. Proof journeys listed by
      # scripts/ci-journey-suite.sh that launch MainActivity should use the
      # launch-owned createAndroidComposeRule<MainActivity>() +
      # SeedBeforeLaunchRule harness, not the old createEmptyComposeRule() +
      # manual ActivityScenario.launch shape, unless a local
      # JOURNEY_HARNESS_JUSTIFIED reason is present. Current-main legacy classes
      # are baselined so this pins new drift without duplicating the #911
      # migration backlog.
      - name: CI journey harness guard (issue #848)
        run: |
          chmod +x scripts/check-ci-journey-harness.sh scripts/check-ci-journey-harness-selftest.sh
          scripts/check-ci-journey-harness.sh
          scripts/check-ci-journey-harness-selftest.sh

      # Issue #865: raw-component drift guardrail. After the #756 design-
      # consistency migrations landed (#860/#861/#862/#863 — shared ConfirmDialog
      # / FormDialog / LoadingIndicator.Spinner / PocketShellButton own the
      # canonical dialog/spinner/text-button look), this fast static grep PINS a
      # per-file baseline of the raw `AlertDialog(` / `CircularProgressIndicator(`
      # / `TextButton(` call-sites that remain and FAILS only when a file gains a
      # NEW one (or a new file ships with any). Stops the migrated backlog from
      # silently re-growing. Cheap (< 1 s grep), no emulator — belongs in the Unit
      # job. Re-baseline with `scripts/check-component-drift.sh --update` after a
      # screen migrates (lowering a count is encouraged).
      - name: Raw-component drift guard (issue #865)
        run: |
          chmod +x scripts/check-component-drift.sh
          scripts/check-component-drift.sh

      # Issue #901: design-token (radius/font-size) ladder guardrail. Sibling of
      # the #865 component-drift guard: this fast static grep PINS a per-file
      # baseline of off-ladder `RoundedCornerShape(<N>.dp)` / `fontSize = <N>.sp`
      # literals (the #461/Slice-D type+radius ladder: 8/14/20/28 radii,
      # 11/13/14/16/20 sizes) and FAILS only when a file gains a NEW off-ladder
      # literal (or a new file ships with any). The script existed but was never
      # wired in, so the Conversation view silently drifted to hardcoded 4/6.dp
      # radii and 10/12.sp text undetected. Cheap (< 1 s grep), no emulator —
      # belongs in the Unit job. Re-baseline with
      # `scripts/check-design-tokens.sh --update` after a screen migrates.
      - name: Design-token ladder guard (issue #901)
        run: |
          chmod +x scripts/check-design-tokens.sh
          scripts/check-design-tokens.sh

      # Repo-wide oversized-file hygiene guard. This fast git-ls-files ratchet
      # pins the current oversized first-party files by byte count and fails if
      # one grows, or if a new non-exempt tracked file exceeds 128 KiB. Vendor,
      # generated, worktree output, and shared/core-terminal are exempted. Lower
      # sizes are welcome; re-baseline with --update only after shrinkage.
      - name: Oversized-file hygiene guard
        run: |
          chmod +x scripts/check-file-size-hygiene.sh
          scripts/check-file-size-hygiene.sh --self-test
          scripts/check-file-size-hygiene.sh

      # Issue #1047 (re-landed + re-baselined under #1324): connection-core
      # god-object ratchet. Three fast static greps over
      # app/.../tmux/TmuxSessionViewModel.kt that stop the dual-authority /
      # god-object from GROWING (Path-B guardrails, protective under both the
      # consolidate-into-ConnectionController path and the keep-patching path):
      #   G-A no new Dispatchers.IO / runBlocking (use an injectable seam),
      #   G-B freeze the ConnectionDecision variant count (new decisions go to
      #       core-connection.ConnectionController), G-C no-growth line cap (the
      #   VM may only shrink). Each is a ONE-WAY DOWNWARD ratchet — re-baseline
      #   with `scripts/check-connection-vm-ratchet.sh --update` only after an
      #   extraction slice LOWERS a count (S4-S8 of the consolidation roadmap).
      #   --self-test first proves the guard's own red->green logic, then the
      #   bare run checks the real VM. Cheap (< 1 s grep), no emulator — belongs
      #   in the Unit job.
      - name: Connection-VM ratchet guard (issue #1047)
        run: |
          chmod +x scripts/check-connection-vm-ratchet.sh
          scripts/check-connection-vm-ratchet.sh --self-test
          scripts/check-connection-vm-ratchet.sh

      # Issue #835: gate the emulator-journey suite's OWN budget/labelling logic
      # so the #470-stall hardening cannot silently regress. This is a fast
      # JVM-free shell test (stubbed gradle/adb, tiny budget) proving the suite
      # bails CLEANLY at its deadline, ALWAYS writes summary.md, marks it with
      # the distinct JOURNEY_STEP_TIMEOUT label, exits red, and (issue #835
      # REOPENED, the DURABLE GUARD) that the workflow classifier now routes that
      # summary to a HARD-RED timeout verdict — NOT advisory-green and NOT the
      # #771 EMULATOR INFRA UNAVAILABLE branch — so a cut-short load-bearing class
      # can never again be masked. Cheap (< 15 s), no emulator.
      - name: CI journey-suite budget guard (issue #835)
        run: |
          chmod +x scripts/test-ci-journey-budget.sh
          scripts/test-ci-journey-budget.sh

      # Issue #760: the unit job occasionally failed with ALL visible tests
      # PASSED — a gradle-daemon/runner OOM abort, not a real assertion failure.
      # ubuntu-latest gives 7 GB RAM and 2 cores; unbounded gradle worker fan-out
      # plus an oversized test JVM heap can push the runner into the OOM-killer,
      # which kills the gradle process mid-run AFTER the tests reported green.
      # Bound BOTH the gradle worker count and the JVM heaps so the job stays
      # inside the runner's memory budget: --max-workers=2 matches the 2 vCPUs,
      # and the explicit -Dorg.gradle.jvmargs caps the gradle daemon/launcher
      # heap while -Pkotlin/test forks inherit the project's modest -Xmx. This is
      # infra robustness only — no test is removed, skipped, or weakened.
      - name: Run JVM unit tests
        timeout-minutes: 35
        run: |
          ./gradlew test --no-daemon --stacktrace \
            --max-workers=2 \
            -Dorg.gradle.jvmargs="-Xmx3g -XX:MaxMetaspaceSize=768m -Dfile.encoding=UTF-8"

      - name: Upload unit test reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-reports
          path: |
            **/build/reports/tests/
            **/build/test-results/
          if-no-files-found: ignore

  python:
    name: Python utility tests (pocketshell)
    runs-on: ubuntu-latest

    # Issue #170 (first PR): the unified `pocketshell` server-side
    # utility lives under `tools/pocketshell/` as a standalone Python
    # package. It does not participate in the Gradle build, so a separate
    # CI job exercises its pytest suite. Cheap (~5 s including install)
    # so it runs on every push without gating downstream Android jobs.
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install --upgrade uv

      - name: Install pocketshell + dev deps
        working-directory: tools/pocketshell
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Run pytest
        working-directory: tools/pocketshell
        run: uv run pytest -v

      # Issue #948: fail at PR time when the app `versionName`
      # (app/build.gradle.kts) and the tools/pocketshell package `version`
      # (pyproject.toml) drift. The app derives the EXPECTED host pocketshell
      # CLI version from its own versionName, so a drift makes the in-app
      # host-version banner nag the user (it happened 2026-06-25: app 0.4.16
      # vs package 0.4.14). The existing check-pypi-version.sh only runs on
      # tag push; this catches the drift at PR/push time. --self-test first
      # proves the guard's own red->green logic, then the bare run checks the
      # real tree. Cheap (~1s); kept in this cheap Python job, not the emulator
      # job.
      - name: "Version-coupling guard (issue #948)"
        run: |
          chmod +x scripts/check-version-coupling.sh
          scripts/check-version-coupling.sh --self-test
          scripts/check-version-coupling.sh

      - name: Smoke-test installed CLI
        working-directory: tools/pocketshell
        run: |
          .venv/bin/pocketshell --version
          .venv/bin/pocketshell --help
          .venv/bin/pocketshell usage --help

  integration:
    name: Integration tests (Docker)
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties', '**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # ubuntu-latest runners have Docker preinstalled and the daemon running,
      # which is what Testcontainers needs. Sanity-check before we hand off.
      - name: Verify Docker is available
        run: docker info

      # Issue #691: core-tmux:integrationTest (Testcontainers, no emulator) is
      # added here so the control-mode contract — `tmux -CC` spawns, structural
      # events surface, one-command-at-a-time framing, list-sessions/new-session
      # round-trips — is pinned on EVERY push, not only nightly. Cheap win: it
      # runs on the same plain Docker runner as the other integration tests.
      - name: Run integration tests
        timeout-minutes: 45
        run: ./gradlew :app:integrationTest :shared:core-ssh:integrationTest :shared:core-portfwd:integrationTest :shared:core-tmux:integrationTest --no-daemon --stacktrace

      - name: Upload integration test reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-reports
          path: |
            **/build/reports/tests/
            **/build/test-results/
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Per-push emulator-journey job (issue #691, the #638 mandate that never
  # landed). Runs the LOAD-BEARING terminal-attach/switch JOURNEY proof on the
  # emulator + deterministic Docker `agents:2222` fixture on EVERY push, so the
  # never-black / wrong-session / EOF-on-switch regressions are caught at PR
  # time, not the next morning by nightly or at release by the gate.
  #
  # Issue #710 (RE-ADDED): MultiSessionSwitchJourneyE2eTest is back in this
  # per-push subset. It was quarantined under #691 because it WEDGED on the
  # GitHub android-emulator-runner AVD (rapid A->B->C->A backgrounded a
  # just-switched runtime whose VM-clear park stalled the main thread on an
  # UNBOUNDED `cancelAndJoin()`). #710 bounds that teardown at
  # SYNC_DETACH_TIMEOUT_MS so the main thread is guaranteed to return. The
  # per-push subset is therefore the full A->B->C->A switch journey plus
  # DeepLinkSessionSwitchE2eTest, ColdRestoreGoneSessionNoResurrectE2eTest,
  # ReconnectRepaintE2eTest, and BackgroundGraceReconnectE2eTest (see
  # scripts/ci-journey-suite.sh for the inline note). The suite also passes
  # AndroidJUnitRunner's per-test `timeout_msec` so any future wedge fails fast
  # instead of hanging, and the job `timeout-minutes` below is a 45-min backstop.
  #
  # Issue #795 (ADDED): the #794 ~90s STEADY-HOLD no-flap proof
  # (LongRunningSessionStabilityTest#steadyForegroundHoldDoesNotFlapTransportEveryTenSeconds)
  # joins this subset. #794 fixed the ~11s app-initiated SSH transport flap on a
  # quiet foreground hold (the maintainer's black-screen / "conversations don't
  # work" report), but its regression proof ran ONLY in the opt-in release gate,
  # so the flap could silently come back at PR time. Per the #638/#691 "load-
  # bearing connection-lifecycle journeys run in regular per-PR CI" mandate it is
  # now in scripts/ci-journey-suite.sh, targeted by FQCN#method so the sibling
  # opt-in 10-minute hold (which self-skips without `pocketshellLongRunningTest=1`)
  # stays release-gate-only. It uses the SAME deterministic agents:2222 fixture as
  # the classes above — no new Docker service/port.
  #
  # This is intentionally the FAST subset (scripts/ci-journey-suite.sh), not the
  # full connected suite — the heavy/long-running + toxiproxy network-fault +
  # bootstrap-matrix suites stay in nightly-extensive.yml. The selected proofs
  # need no toxiproxy proxy family, so this job brings up only the deterministic
  # `agents` (2222) fixture plus the deterministic `agents-old-cli` (2238, issue
  # #849) fixture — both plain SSH/tmux, keeping the job deterministic (the
  # maintainer already gets CI email spam — a flaky per-push job would make that
  # worse).
  #
  # Issue #849 (epic #848, ADDED): the v0.4.10 connect-break regression tests
  # (FolderListOldCliHydrateDockerTest + FolderListBootstrapSkipTreeLoadsDockerTest)
  # + the #759 agent-launch version-mismatch guard
  # (AgentLaunchVersionMismatchHintE2eTest) are now in scripts/ci-journey-suite.sh.
  # The two old-CLI Docker tests need a host whose `pocketshell` CLI is OLDER than
  # the client, so this job now ALSO starts the `agents-old-cli` fixture on host
  # port 2238 (below). Before this, those tests self-skipped on CI and the whole
  # connect-break class was structurally invisible to CI — the exact #848 gate gap.
  emulator-journey:
    name: Emulator journey subset (load-bearing, Docker agents)
    if: github.event_name != 'pull_request'
    needs: [unit, python, integration]
    runs-on: ubuntu-latest
    # Issue #835 (REOPENED, SHARD): the right-size-only fix (#1055, 45->95 cap +
    # 4200s budget + Gradle daemon reuse) STILL could not finish the full
    # selection serially on ONE swiftshader AVD — its own validation run
    # (98384e91, run 28307686762) ran the full 95 min and was CANCELLED. ~83
    # journey classes + 6 proofs run serially is ~69+ min of wall-clock AND
    # degrades the single emulator (the #470 enumeration stall worsens the more
    # the one AVD is churned). Fix: SHARD the journey class list across a matrix
    # of runners — each leg is its OWN runner + cold-booted emulator + Docker
    # `agents` fixtures and runs only its 1/N round-robin slice (the suite reads
    # POCKETSHELL_JOURNEY_CI_SHARD_INDEX/_TOTAL; see scripts/ci-journey-suite.sh).
    # That cuts each leg's wall-clock to ~1/N (comfortably inside the budget) and
    # keeps each emulator far healthier (~1/N install/teardown cycles), attacking
    # the #470 root. `fail-fast: false` so one shard's failure does not cancel the
    # others (we want every shard's verdict). The 6 core-terminal proofs are NOT
    # sharded — they run on every leg (cheap in-process Compose UI tests).
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2]
    env:
      # Set by the matrix; the suite partitions JOURNEY_CLASSES round-robin by
      # (index % total). Keep _TOTAL in sync with the length of matrix.shard.
      POCKETSHELL_JOURNEY_CI_SHARD_INDEX: ${{ matrix.shard }}
      POCKETSHELL_JOURNEY_CI_SHARD_TOTAL: 3
    # Issue #835 (REOPENED, RIGHT-SIZE): raised 45 -> 95 originally so the FULL
    # serial selection could finish; with sharding each leg runs ~1/3 the classes
    # and finishes well under this cap. `timeout-minutes` is a CAP, not a fixed
    # duration: the job ENDS when the suite ends (early on a healthy run), so this
    # only bounds the absolute worst case. The suite owns its OWN 4200s budget and
    # bails cleanly before this cap; the arithmetic is
    # 95-min cap (5700s) - 900s worst-case boot - 4200s suite budget = 600s for
    # the classifier + Docker log collection + artifact upload (the same 600s
    # slack the #908 invariant kept).
    # A wedging test still fails fast via the per-test `timeout_msec` in the
    # suite; this cap only bounds the absolute worst case so a hang can never burn
    # the runner indefinitely.
    timeout-minutes: 95

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties', '**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew + suite script executable
        run: chmod +x ./gradlew scripts/ci-journey-suite.sh

      - name: Verify Docker is available
        run: docker info

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Issue #760: the AVD create intermittently FATAL-ed with
      # "Not enough space to create userdata partition. Available: 6957 MB,
      # need 7372 MB" — pure runner disk pressure, not a test failure. The
      # ubuntu-latest image ships ~30 GB of preinstalled SDKs/toolchains we do
      # not use for this job (.NET, Haskell/GHC, the bundled Android NDK, the
      # large CodeQL/boost caches). Reclaim them BEFORE the emulator-runner
      # creates the AVD so the userdata partition always fits, then print the
      # free space so a future disk regression is visible in the log. The `|| true`
      # guards keep the step green if a path is already gone on a newer image.
      #
      # Issue #771 (round-3, PROVEN ROOT CAUSE): the original #760 version also
      # ran
      #     sudo rm -rf "$AGENT_TOOLSDIRECTORY"   # == /opt/hostedtoolcache
      # which DELETED the JDK that `actions/setup-java@v5` installs under
      # `/opt/hostedtoolcache/Java_*` and that `JAVA_HOME` points into
      # (e.g. /opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/17.0.19-10/x64).
      # After that delete, EVERY Java tool died with
      #     ERROR: JAVA_HOME is set to an invalid directory: …
      # so the runner's sdkmanager (and the #771 freshly-reinstalled copy)
      # crashed instantly and the emulator never booted. The cmdline-tools were
      # never the real problem — the missing JDK was. Fix: prune the OTHER
      # tool-caches under $AGENT_TOOLSDIRECTORY but PRESERVE the directory the
      # live JAVA_HOME resolves into, so the active JDK survives.
      - name: Free disk space for the AVD
        run: |
          set -uo pipefail
          echo "::group::Disk before cleanup"
          df -h /
          echo "::endgroup::"
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/lib/android/sdk/ndk || true
          sudo rm -rf /opt/ghc /usr/local/.ghcup || true
          sudo rm -rf /usr/local/share/boost || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          # Prune unused tool-caches under $AGENT_TOOLSDIRECTORY but KEEP the
          # active JDK that JAVA_HOME depends on (issue #771). Resolve the
          # top-level tool-cache subdir the live JAVA_HOME lives in (e.g.
          # `Java_Temurin-Hotspot_jdk`) and exclude exactly that one, so the
          # exact JDK setup-java installed survives even across version bumps.
          if [[ -n "${AGENT_TOOLSDIRECTORY:-}" && -d "${AGENT_TOOLSDIRECTORY:-}" ]]; then
            keep_dir=""
            if [[ -n "${JAVA_HOME:-}" && "$JAVA_HOME" == "$AGENT_TOOLSDIRECTORY"/* ]]; then
              # First path segment of JAVA_HOME relative to the tool-cache root.
              rel="${JAVA_HOME#"$AGENT_TOOLSDIRECTORY"/}"
              keep_dir="${rel%%/*}"
            fi
            echo "Pruning $AGENT_TOOLSDIRECTORY, keeping active JDK dir: '${keep_dir:-<none>}'"
            if [[ -n "$keep_dir" ]]; then
              sudo find "$AGENT_TOOLSDIRECTORY" -mindepth 1 -maxdepth 1 \
                ! -name "$keep_dir" -exec rm -rf {} + || true
            else
              # No JAVA_HOME under the tool-cache (unexpected): leave the dir
              # intact rather than risk deleting the JDK. The deletions above
              # plus docker prune already free far more than the 9000 MB guard.
              echo "JAVA_HOME not under \$AGENT_TOOLSDIRECTORY; leaving it intact to protect the JDK."
            fi
          fi
          sudo docker image prune -af || true
          echo "::group::Disk after cleanup"
          df -h /
          echo "::endgroup::"
          # Confirm the active JDK survived the prune (issue #771): a deleted
          # JAVA_HOME makes every Java tool fail with
          # "JAVA_HOME is set to an invalid directory" and the emulator never
          # boots. Fail NOW with an explicit infra classification if it's gone.
          if [[ -n "${JAVA_HOME:-}" && ! -x "$JAVA_HOME/bin/java" ]]; then
            echo "::error title=EMULATOR INFRA UNAVAILABLE::JAVA_HOME=$JAVA_HOME has no bin/java after disk cleanup; the JDK was deleted (issue #771 regression guard). This is an infra setup error, not a test failure."
            exit 1
          fi
          avail_mb="$(df -m --output=avail / | tail -1 | tr -d ' ')"
          echo "Available on / after cleanup: ${avail_mb} MB"
          # The AVD userdata partition needs ~7372 MB; require a safe margin so
          # the create cannot FATAL on disk. If it still can't be freed, fail
          # NOW with an explicit infra classification rather than letting the
          # emulator-runner FATAL deeper in with a confusing message.
          if [[ "$avail_mb" -lt 9000 ]]; then
            echo "::error title=EMULATOR INFRA UNAVAILABLE::Only ${avail_mb} MB free on / after cleanup; the AVD userdata partition needs ~7372 MB. This is a runner-disk infra shortage (issue #760), not a test failure."
            exit 1
          fi

      # Issue #771 — REAL root cause + fix (supersedes the earlier "warm up a
      # separate SDK copy" pre-step, which was INEFFECTIVE).
      #
      # The job dies inside the emulator-runner action's OWN "Install Android SDK"
      # step. The action runs, by name on PATH:
      #     sh -c "yes | sdkmanager --licenses > /dev/null"
      # and that exits 1 in ~10 ms — far too fast for a JVM tool that actually
      # started. The matching symptom in the previous pre-step's log was
      # `yes: standard output: Broken pipe` on EVERY attempt: `sdkmanager` exits
      # before reading a single line of stdin, so `yes` gets SIGPIPE. In other
      # words the runner image's PRE-INSTALLED `sdkmanager`
      # ($ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager) is broken on the
      # current ubuntu-24.04 image and crashes instantly. The later
      # "could not connect to TCP port 5554" is only the action's cleanup handler
      # firing after that crash — no emulator was ever started.
      #
      # Why the previous attempt did NOT work: it accepted licenses / warmed
      # packages against the SAME broken sdkmanager and threw the output away
      # (`> /dev/null 2>&1`), so it could not even tell the binary was crashing.
      # And the action does not reuse a "warmed" SDK — it re-invokes its own
      # `sdkmanager --licenses` regardless, against the same broken binary.
      #
      # Why bumping the action version does NOT help: android-emulator-runner only
      # downloads its own cmdline-tools when `$ANDROID_HOME/cmdline-tools` does NOT
      # already exist (`if (!fs.existsSync(cmdlineToolsPath))`). On the hosted
      # runner that directory exists, so EVERY action version (incl. main) skips
      # the download and uses the runner's broken pre-installed sdkmanager.
      #
      # THE FIX (targets the action's actual failing call): replace the runner's
      # broken `$ANDROID_HOME/cmdline-tools/latest` with the exact known-good
      # cmdline-tools build the action itself pins (commandlinetools build
      # 14742923). When the action then runs `sdkmanager --licenses` by name on
      # PATH, PATH resolves to THIS freshly-installed, working sdkmanager — the
      # same path the action uses — so its own license step succeeds and the AVD
      # actually boots. We also accept licenses + warm the api-34 packages with
      # the fresh tools so the action's subsequent install is a no-op.
      #
      # This step runs BEFORE any emulator/test, so a failure here can only ever
      # block the run on infra provisioning — it can NEVER turn a genuine J1/J3
      # test failure green (no #636/#638 false-green). We keep the journey suite
      # + #760 retry-once + classifier below as the sole authoritative test gate.
      - name: Repair Android cmdline-tools + accept licenses (issue #771)
        run: |
          set -uo pipefail
          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-/usr/local/lib/android/sdk}}"
          echo "Using SDK_ROOT=$SDK_ROOT"
          PREINSTALLED="$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"

          # 1) DIAGNOSE the pre-installed sdkmanager so the next CI run proves the
          #    root cause (do NOT discard stderr this time). A working sdkmanager
          #    prints its version in well under a second; the broken one exits
          #    instantly. `|| true` keeps this purely diagnostic.
          echo "::group::Diagnose pre-installed sdkmanager (expected to be broken)"
          if [[ -x "$PREINSTALLED" ]]; then
            echo "java -version:"; java -version 2>&1 | sed 's/^/  /' || true
            echo "sdkmanager --version (stderr included):"
            "$PREINSTALLED" --version 2>&1 | sed 's/^/  /' || echo "  (non-zero exit from pre-installed sdkmanager --version)"
          else
            echo "No pre-installed sdkmanager at $PREINSTALLED"
          fi
          echo "::endgroup::"

          # 2) REPAIR: install the action's exact known-good cmdline-tools build
          #    over the (broken) pre-installed `latest`, so the action's own
          #    PATH-resolved `sdkmanager --licenses` runs against a working copy.
          CMDLINE_TOOLS_ZIP="commandlinetools-linux-14742923_latest.zip"
          CMDLINE_TOOLS_URL="https://dl.google.com/android/repository/${CMDLINE_TOOLS_ZIP}"
          echo "::group::Reinstall known-good cmdline-tools (build 14742923)"
          TMP_DL="$(mktemp -d)"
          ok=""
          for attempt in 1 2 3; do
            if curl -fsSL --retry 3 -o "$TMP_DL/$CMDLINE_TOOLS_ZIP" "$CMDLINE_TOOLS_URL"; then
              ok="yes"; echo "Downloaded $CMDLINE_TOOLS_ZIP on attempt $attempt"; break
            fi
            echo "cmdline-tools download attempt $attempt failed; retrying in 5s..."
            sleep 5
          done
          if [[ -z "$ok" ]]; then
            echo "::error title=cmdline-tools download failed::Could not fetch ${CMDLINE_TOOLS_URL} after retries. This is a runner-network infra failure, not a test failure (issue #771)."
            exit 1
          fi
          rm -rf "$TMP_DL/extract"
          unzip -q "$TMP_DL/$CMDLINE_TOOLS_ZIP" -d "$TMP_DL/extract"
          # The zip extracts to `cmdline-tools/`; the action expects the tools at
          # `$SDK_ROOT/cmdline-tools/latest`.
          rm -rf "$SDK_ROOT/cmdline-tools/latest"
          mkdir -p "$SDK_ROOT/cmdline-tools"
          mv "$TMP_DL/extract/cmdline-tools" "$SDK_ROOT/cmdline-tools/latest"
          SDKMANAGER="$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          chmod +x "$SDKMANAGER" || true
          echo "Installed fresh sdkmanager at $SDKMANAGER"
          echo "::endgroup::"

          # 3) VERIFY the fresh sdkmanager actually runs. This is the load-bearing
          #    proof that the repair worked (a JVM tool that starts prints a
          #    version line in well under a second). If it still can't run, fail
          #    NOW with an explicit infra classification rather than letting the
          #    action crash deeper with the confusing "TCP port 5554" message.
          echo "::group::Verify fresh sdkmanager"
          if ! "$SDKMANAGER" --version; then
            echo "::error title=sdkmanager still broken after repair::The freshly-installed cmdline-tools sdkmanager still failed to run (issue #771). Treat as EMULATOR INFRA UNAVAILABLE, not a test failure."
            exit 1
          fi
          echo "::endgroup::"

          # 4) Accept licenses + warm the exact api-34 packages with the WORKING
          #    tools so the action's own license/install step is a no-op. Output is
          #    visible this time so a future regression is diagnosable. The `|| true`
          #    keeps these non-fatal: the action re-runs them, and the journey
          #    suite + classifier remain the authoritative test gate.
          echo "::group::Accept SDK licenses"
          yes | "$SDKMANAGER" --sdk_root="$SDK_ROOT" --licenses || true
          echo "::endgroup::"
          echo "::group::Warm up api-35 packages"
          "$SDKMANAGER" --sdk_root="$SDK_ROOT" \
            "platform-tools" \
            "platforms;android-35" \
            "system-images;android-35;google_apis;x86_64" || true
          echo "::endgroup::"

      - name: Build SSH base image
        run: docker compose -f tests/docker/docker-compose.yml build sshd

      # The selected journeys (DeepLinkSessionSwitch, MultiSessionSwitch,
      # ColdRestoreGoneSessionNoResurrect, ReconnectRepaint,
      # BackgroundGraceReconnect, plus the share-auth pair ShareTarget +
      # SharePassphraseDialog promoted in #727) all drive the plain deterministic
      # `agents` fixture on host port 2222 (emulator 10.0.2.2:2222) and NONE of
      # them need the opt-in toxiproxy network-fault proxies. Bring up `agents`
      # (2222) plus the deterministic `agents-old-cli` (2238, issue #849) fixture
      # below — both are plain SSH/tmux fixtures with NO toxiproxy, so the job
      # stays deterministic.
      - name: Start Docker fixture (agents)
        run: |
          docker compose -f tests/docker/docker-compose.yml up -d --build --no-deps agents

      - name: Wait for the agents fixture to report healthy
        run: |
          source tests/docker/lib/wait-for-healthy.sh
          wait_for_container_healthy tests/docker/docker-compose.yml agents /tmp/agents-health.log 60
          cat /tmp/agents-health.log

      - name: Verify agent SSH target tool surface
        run: |
          chmod 600 tests/docker/test_key
          ssh -i tests/docker/test_key -p 2222 \
            -o BatchMode=yes \
            -o ConnectTimeout=2 \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            testuser@127.0.0.1 \
            'for tool in pocketshell agent-log-explorer tmuxctl quse; do command -v "$tool"; done'

      # Issue #849 (epic #848): bring up the OLD-CLI fixture on host port 2238 so
      # the v0.4.10 connect-break regression tests
      # (FolderListOldCliHydrateDockerTest + FolderListBootstrapSkipTreeLoadsDockerTest)
      # actually RUN on CI. The fixture's `pocketshell` is OLDER than the client
      # (no `tree` / `agents kind` subcommands) and reports an older `--version`,
      # so it reproduces the maintainer's 0.4.9-host scenario (cold-start hydrate
      # errors + the bootstrap "Host setup needed" sheet on connect). Without
      # this fixture started, those tests self-skipped on CI and the whole
      # connect-break class was structurally invisible to CI (the #848 gate gap).
      - name: Start Docker fixture (agents-old-cli, issue #849)
        run: |
          docker compose -f tests/docker/docker-compose.yml up -d --build --no-deps agents-old-cli

      - name: Wait for the agents-old-cli fixture to report healthy
        run: |
          source tests/docker/lib/wait-for-healthy.sh
          wait_for_container_healthy tests/docker/docker-compose.yml agents-old-cli /tmp/agents-old-cli-health.log 60
          cat /tmp/agents-old-cli-health.log

      # Confirm the 2238 fixture really IS an old CLI (rejects `tree` with a
      # non-zero exit) while staying live (tmux works), so the regression tests
      # exercise the real CLI-mismatch path and never pass vacuously against a
      # fixture that silently accepted the new subcommand.
      - name: Verify agents-old-cli is a CLI mismatch (issue #849)
        run: |
          chmod 600 tests/docker/test_key
          ssh -i tests/docker/test_key -p 2238 \
            -o BatchMode=yes \
            -o ConnectTimeout=3 \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            testuser@127.0.0.1 \
            'pocketshell tree get </dev/null; rc=$?; if [ "$rc" -eq 0 ]; then echo "old-cli fixture unexpectedly accepted tree get (rc=0)" >&2; exit 1; fi; tmux -V >/dev/null && echo "old-cli mismatch confirmed: tree get rc=$rc, host still live"'

      # Issue #839 (epic #821 workstream C): bring up the DAEMON fixture on host
      # port 2239 so the durable-tree journey (FolderListDurableTreeDaemonDockerTest)
      # actually RUNS on CI. Its `pocketshell` is the REAL Python package (genuine
      # `tree.py` daemon code), so `tree get|upsert|reconcile` PERSIST a host-side
      # JSON registry that survives an app kill + relaunch — the #837 durable
      # property. Without this fixture started the journey self-skipped on CI and
      # the durable-tree assertion had ZERO per-push protection (D32/G4/F3). Mirrors
      # the agents-old-cli (#849) precedent directly above.
      - name: Start Docker fixture (agents-daemon, issue #839)
        run: |
          docker compose -f tests/docker/docker-compose.yml up -d --build --no-deps agents-daemon

      - name: Wait for the agents-daemon fixture to report healthy
        run: |
          source tests/docker/lib/wait-for-healthy.sh
          wait_for_container_healthy tests/docker/docker-compose.yml agents-daemon /tmp/agents-daemon-health.log 60
          cat /tmp/agents-daemon-health.log

      # Confirm the 2239 fixture really IS the REAL daemon: `pocketshell tree`
      # round-trips a persist (upsert then get over a fresh exec returns the
      # collapsed node) AND reconcile diffs against the LIVE tmux server. A broken
      # fixture fails the job loudly here instead of letting the journey pass
      # vacuously / self-skip. Mirrors the agents-old-cli mismatch sanity check.
      - name: Verify agents-daemon real `pocketshell tree` persists (issue #839)
        run: |
          chmod 600 tests/docker/test_key
          ssh -i tests/docker/test_key -p 2239 \
            -o BatchMode=yes \
            -o ConnectTimeout=3 \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            testuser@127.0.0.1 \
            'set -e;
             printf "%s" "{\"host\":\"ci\",\"nodes\":[{\"session\":\"s\",\"order\":0,\"folder_path\":\"/p\",\"collapsed\":true}]}" | pocketshell tree upsert >/dev/null;
             got="$(printf "%s" "{\"host\":\"ci\"}" | pocketshell tree get)";
             echo "$got" | grep -q "\"session\": \"s\"" || { echo "agents-daemon tree did NOT persist: $got" >&2; exit 1; };
             echo "$got" | grep -q "\"collapsed\": true" || { echo "agents-daemon tree dropped the collapse: $got" >&2; exit 1; };
             echo "agents-daemon real-tree persist confirmed: $got"'

      # Issue #760: the journey job intermittently failed with
      # "WARNING | Failed to load snapshot 'default_boot'" followed by
      # "adb … exit code 1" — a STALE/CORRUPT quickboot snapshot the runner
      # tried to restore, so the emulator never reached `device`. Force a clean
      # COLD boot every run so we never depend on a `default_boot` snapshot:
      #   * `force-avd-creation: true`  — recreate the AVD from scratch (no reuse
      #     of a prior, possibly-corrupt AVD/snapshot state).
      #   * `-no-snapshot-load` in emulator-options — never restore quickboot;
      #     boot cold. (`-no-snapshot-save` was already set, so nothing is saved
      #     either — the pair guarantees a deterministic cold boot.)
      #
      # Infra-retry-once (separate from the per-class test retry inside
      # scripts/ci-journey-suite.sh): the FIRST emulator bringup is
      # `continue-on-error`; if it fails (boot/adb infra flake), a SECOND
      # identical bringup runs. The journey TESTS only "really failed" if the
      # second attempt's suite reports failures — a one-off boot flake recovers
      # to green instead of spamming a red-CI email on an inert diff.
      - name: Run load-bearing journey subset on the emulator
        id: journey
        continue-on-error: true
        # Issue #771: pin to the v2.37.0 commit (the floating `v2` tag currently
        # resolves here) so a future surprise bump of the tag can't silently
        # change SDK-install behaviour under us. Today's red was the GitHub
        # hosted-runner SDK/license install (handled by the pre-accept step
        # above), NOT an action regression — this pin is hygiene, not the fix.
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
        with:
          # API 35 (Android 15): matches the maintainer's dogfood device and the
          # three connection-core journeys (BoundedGraceSessionHoldJourneyE2eTest,
          # NotificationTapLivePinnedForegroundReseedJourneyE2eTest,
          # SessionConnectionServiceE2eTest) that hard-assert SDK_INT == 35.
          # nightly-extensive.yml already runs these classes green on this exact
          # image/action. (#1197)
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_7
          force-avd-creation: true
          disable-animations: true
          emulator-options: -no-snapshot-save -no-snapshot-load -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -camera-front none
          emulator-boot-timeout: 900
          script: scripts/ci-journey-suite.sh

      # Issue #835/#470: inspect the first attempt's suite-owned summary before
      # spending the second cold boot. If the first attempt already reached the
      # suite budget and wrote a pure JOURNEY_STEP_TIMEOUT summary (no
      # JOURNEY_FAILED / Failed BOTH attempts section), retrying inside this
      # same job cannot recover it (a budget timeout is deterministic given the
      # class set vs the budget); it only gets cancelled by the job cap and
      # creates another red email. Genuine journey failures and no-summary
      # boot/adb aborts still retry and classify below.
      - name: Inspect first journey summary
        id: journey_summary
        if: always()
        run: |
          summary="artifacts/ci-journey/summary.md"
          first_timeout="false"
          first_failure="false"
          if [[ -f "$summary" ]] && grep -qE 'JOURNEY_FAILED|Failed BOTH attempts' "$summary"; then
            first_failure="true"
          fi
          if [[ "$first_failure" != "true" && -f "$summary" ]] && grep -qE 'JOURNEY_STEP_TIMEOUT|Suite step time budget exhausted' "$summary"; then
            first_timeout="true"
          fi
          echo "first_timeout=$first_timeout" >> "$GITHUB_OUTPUT"
          echo "first_failure=$first_failure" >> "$GITHUB_OUTPUT"
          echo "first summary timeout-only: $first_timeout"
          echo "first summary genuine failure: $first_failure"

      # Preserve the first cold-boot attempt before a retry can overwrite the
      # shared artifacts/ci-journey summary or Gradle connected-test outputs.
      - name: Preserve first journey attempt diagnostics
        if: always() && steps.journey.outcome == 'failure'
        run: |
          snapshot="artifacts/ci-journey-attempt-1"
          rm -rf "$snapshot"
          mkdir -p "$snapshot"

          {
            echo "# First emulator journey attempt diagnostics"
            echo
            echo "- first attempt outcome: \`${{ steps.journey.outcome }}\`"
            echo "- first attempt conclusion: \`${{ steps.journey.conclusion }}\`"
            echo "- first summary timeout-only: \`${{ steps.journey_summary.outputs.first_timeout }}\`"
            echo "- first summary genuine failure: \`${{ steps.journey_summary.outputs.first_failure }}\`"
            if [[ -f artifacts/ci-journey/summary.md ]]; then
              echo "- suite summary: \`ci-journey/summary.md\`"
            else
              echo "- suite summary: missing after first attempt"
            fi
          } > "$snapshot/attempt-metadata.md"

          if [[ -d artifacts/ci-journey ]]; then
            mkdir -p "$snapshot/ci-journey"
            cp -a artifacts/ci-journey/. "$snapshot/ci-journey/"
          else
            echo "artifacts/ci-journey was missing after the first attempt." > "$snapshot/ci-journey-missing.txt"
          fi
          if [[ ! -f "$snapshot/ci-journey/summary.md" ]]; then
            echo "artifacts/ci-journey/summary.md was missing after the first attempt." > "$snapshot/summary-missing.txt"
          fi

          shopt -s globstar nullglob
          copied_android_outputs=0
          for path in **/build/reports/androidTests \
                      **/build/outputs/androidTest-results \
                      **/build/outputs/connected_android_test_additional_output; do
            [[ -e "$path" ]] || continue
            dest="$snapshot/android-test-outputs/$path"
            mkdir -p "$(dirname "$dest")"
            cp -a "$path" "$dest"
            copied_android_outputs=1
          done
          if [[ "$copied_android_outputs" -eq 0 ]]; then
            echo "No Android connected-test output directories existed after the first attempt." > "$snapshot/android-test-outputs-missing.txt"
          fi

      # Infra-retry-once: runs if the first bringup failed with a boot/adb abort
      # or a genuine test failure. It is deliberately skipped for a pure
      # suite-budget timeout because the first cold boot already consumed the
      # available job budget and wrote the classifier artifact.
      - name: Retry journey subset on a fresh cold-booted emulator
        id: journey_retry
        if: steps.journey.outcome == 'failure' && steps.journey_summary.outputs.first_timeout != 'true'
        continue-on-error: true
        # Issue #771: same v2.37.0 pin as the first attempt (see note above).
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
        with:
          # API 35 (Android 15): matches the maintainer's dogfood device and the
          # three connection-core journeys (BoundedGraceSessionHoldJourneyE2eTest,
          # NotificationTapLivePinnedForegroundReseedJourneyE2eTest,
          # SessionConnectionServiceE2eTest) that hard-assert SDK_INT == 35.
          # nightly-extensive.yml already runs these classes green on this exact
          # image/action. (#1197)
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_7
          force-avd-creation: true
          disable-animations: true
          emulator-options: -no-snapshot-save -no-snapshot-load -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -camera-front none
          emulator-boot-timeout: 900
          script: scripts/ci-journey-suite.sh

      # Classify the final verdict. The job is red for genuine journey failures,
      # for no-summary emulator infra aborts, AND (issue #835 REOPENED) for a
      # suite-budget timeout. A first-attempt failure that the retry recovered is
      # surfaced as an explicit "infra flake recovered" note in the log so a
      # degrading-flake trend stays visible (parity with the suite script's
      # JOURNEY_FLAKE_RECOVERED marker), not silently hidden.
      # A suite-budget timeout is now a HARD RED, not advisory-green (#835
      # REOPENED, D31): the old advisory-green MASKED the fact that a load-bearing
      # class was cut short before reaching a verdict. With the right-sized 4200s
      # budget the full selection should always finish, so a timeout now means the
      # enumeration stall returned or the selection outgrew the budget — both of
      # which leave a load-bearing class unverified and must fail the gate.
      #
      # Issue #771: when BOTH attempts fail, AUTO-CLASSIFY infra-abort vs genuine
      # test-failure from the suite's own artifact instead of telling the human to
      # go read logs. scripts/ci-journey-suite.sh only writes
      # artifacts/ci-journey/summary.md AFTER it has run journey classes to
      # verdicts — which requires a booted emulator + adb + a working gradle
      # connected-test. So when both attempts fail:
      #   * a summary that contains a `JOURNEY_FAILED` / "Failed BOTH attempts"
      #     section => the emulator booted, the suite ran, and a class genuinely
      #     failed twice => GENUINE TEST FAILURE (an app-code regression, NOT the
      #     #771 emulator-infra failure class).
      #   * NO summary file at all (the suite script aborted before writing it,
      #     i.e. the emulator never reached `device` / adb never came up so gradle
      #     could not run) => an EMULATOR INFRA UNAVAILABLE abort — the failure
      #     class issue #771 targets.
      # Genuine journey failures still keep the job RED (exit 1), so a real test
      # regression cannot hide behind an "infra" message.
      - name: Classify emulator-journey result (infra-abort vs test-failure)
        if: always()
        run: |
          first="${{ steps.journey.outcome }}"
          retry="${{ steps.journey_retry.outcome }}"
          first_concl="${{ steps.journey.conclusion }}"
          retry_concl="${{ steps.journey_retry.conclusion }}"
          first_timeout="${{ steps.journey_summary.outputs.first_timeout }}"
          first_failure="${{ steps.journey_summary.outputs.first_failure }}"
          summary="artifacts/ci-journey/summary.md"
          echo "first attempt outcome:  $first"
          echo "retry attempt outcome:  ${retry:-<skipped>}"
          echo "first attempt conclusion:  $first_concl"
          echo "retry attempt conclusion:  ${retry_concl:-<skipped>}"
          echo "first summary timeout-only: ${first_timeout:-false}"
          echo "first summary genuine failure: ${first_failure:-false}"
          if [[ "$first" == "success" ]]; then
            echo "Emulator journey passed on the first cold boot."
            exit 0
          fi
          if [[ "$retry" == "success" ]]; then
            echo "::warning title=Emulator infra flake recovered::The first emulator bringup failed but a second cold boot passed (issue #760). Treating as a recovered infra flake, NOT a test failure. Watch for a degrading trend."
            exit 0
          fi
          if [[ "${first_failure:-false}" == "true" ]]; then
            echo "::error title=Emulator journey FAILED — first attempt genuine failure::The first cold boot wrote a JOURNEY_FAILED / Failed BOTH attempts summary, and the retry did not pass cleanly. Refusing to downgrade this run to advisory timeout even if the retry overwrote summary.md with a timeout-only artifact."
            exit 1
          fi
          if [[ "${first_timeout:-false}" == "true" ]]; then
            timed_out_classes="$(awk '/JOURNEY_STEP_TIMEOUT|Suite step time budget exhausted/{f=1} f && /^- /{gsub(/`/,""); sub(/^- /,"    "); print}' "$summary" || true)"
            echo "::error title=Emulator journey TIMEOUT — load-bearing classes cut short (#835/#470)::The journey suite booted and ran, but exhausted its own 4200s time budget before every load-bearing class reached a verdict (issue #835 / #470). This is now a HARD RED durable guard (#835 REOPENED, D31): a budget timeout means a load-bearing class was silently cut short, which used to be masked as advisory-green. The retry is skipped because a budget timeout is deterministic. Either the enumeration stall has returned or the selection no longer fits the budget — investigate; do NOT treat as a flake. Class(es) cut short / not run:"
            [[ -n "$timed_out_classes" ]] && printf '%s\n' "$timed_out_classes"
            exit 1
          fi
          # If a cold-boot attempt was cancelled, do not trust summary.md for a
          # "failed BOTH" verdict: the retry shares the same workspace path, so
          # an existing summary can be stale from an earlier attempt. A cancelled
          # attempt did not produce a trustworthy final suite verdict.
          if [[ "$first" == "cancelled" || "$retry" == "cancelled" || "$first_concl" == "cancelled" || "$retry_concl" == "cancelled" ]]; then
            echo "::error title=Emulator journey TIMEOUT — step cancelled (#470 stall)::A journey cold-boot attempt was CANCELLED before producing a trustworthy final suite verdict. Any existing artifacts/ci-journey/summary.md may be stale from an earlier attempt, so this is NOT reported as a genuine failed-on-both-cold-boots test regression. This is the recurring enumeration-stall/step-timeout infra class (issue #835 / #470). Re-run."
            exit 1
          fi
          # Both attempts failed — classify from the suite's own summary artifact.
          if [[ -f "$summary" ]] && grep -qE 'JOURNEY_FAILED|Failed BOTH attempts' "$summary"; then
            # The emulator booted and the suite ran to a verdict: a journey class
            # failed twice. This is a GENUINE test failure (app-code regression),
            # NOT the #771 emulator-infra abort.
            failed_classes="$(awk '/Failed BOTH attempts/{f=1; next} f && /^- /{gsub(/`/,""); sub(/^- /,"    "); print}' "$summary" || true)"
            echo "::error title=Emulator journey FAILED — genuine test failure::A load-bearing journey class failed on BOTH cold-boot attempts AFTER the emulator booted and the suite ran to a verdict. This is a real test regression (NOT a #771 emulator-infra abort). Failing class(es):"
            [[ -n "$failed_classes" ]] && printf '%s\n' "$failed_classes"
            exit 1
          fi
          # Issue #835 (REOPENED, DURABLE GUARD): the suite ran (the emulator
          # booted, classes ran to verdicts) but the suite-level time budget was
          # exhausted before every load-bearing class reached a verdict. This
          # used to be downgraded to advisory-green, which MASKED the fact that a
          # load-bearing class (BackgroundGrace / LiveHold / the share/composer/
          # folder tail) was silently cut short — the exact reopen complaint. It
          # is now a HARD RED: a budget timeout means the enumeration stall has
          # returned OR the selection no longer fits the (now right-sized 4200s)
          # budget. Either way a class did not run to a verdict, so the gate must
          # fail. The summary still carries the `JOURNEY_STEP_TIMEOUT` marker so
          # this is attributed distinctly from a genuine `JOURNEY_FAILED`
          # regression and from a never-booted (#771) emulator.
          if [[ -f "$summary" ]] && grep -qE 'JOURNEY_STEP_TIMEOUT|Suite step time budget exhausted' "$summary"; then
            timed_out_classes="$(awk '/JOURNEY_STEP_TIMEOUT|Suite step time budget exhausted/{f=1} f && /^- /{gsub(/`/,""); sub(/^- /,"    "); print}' "$summary" || true)"
            echo "::error title=Emulator journey TIMEOUT — load-bearing classes cut short (#835/#470)::The journey suite booted and ran, but exhausted its 4200s time budget before every load-bearing class reached a verdict (issue #835 / #470). This is now a HARD RED durable guard (#835 REOPENED, D31), NOT an advisory-green: a budget timeout means a load-bearing class was silently cut short. Either the in-emulator enumeration stall has returned or the selection no longer fits the budget — investigate. This is distinct from a never-booted emulator (#771) and from a genuine test regression. Class(es) cut short / not run:"
            [[ -n "$timed_out_classes" ]] && printf '%s\n' "$timed_out_classes"
            exit 1
          fi
          # No suite summary at all: the script aborted before any class reached
          # a verdict. The emulator never reached `device` / adb never came up,
          # so gradle could not run. This is the EMULATOR INFRA UNAVAILABLE
          # class (#771).
          echo "::error title=EMULATOR INFRA UNAVAILABLE::Both cold-boot attempts failed and the journey suite wrote NO summary (artifacts/ci-journey/summary.md missing), so no journey class ever ran to a verdict — the emulator never reached 'device' / adb never came up (boot/adb infra, issue #771). This is an infra abort, NOT a test regression."
          exit 1

      - name: Collect Docker logs
        if: always()
        run: |
          mkdir -p artifacts/docker
          docker compose -f tests/docker/docker-compose.yml ps > artifacts/docker/compose-ps.txt
          docker compose -f tests/docker/docker-compose.yml logs --no-color agents > artifacts/docker/agents.log 2>/dev/null || true
          docker inspect pocketshell-test-agents > artifacts/docker/agents-inspect.json 2>/dev/null || true
          # Issue #849: also capture the old-CLI (2238) fixture diagnostics.
          docker compose -f tests/docker/docker-compose.yml logs --no-color agents-old-cli > artifacts/docker/agents-old-cli.log 2>/dev/null || true
          docker inspect pocketshell-test-agents-old-cli > artifacts/docker/agents-old-cli-inspect.json 2>/dev/null || true
          # Issue #839: also capture the daemon (2239) fixture diagnostics.
          docker compose -f tests/docker/docker-compose.yml logs --no-color agents-daemon > artifacts/docker/agents-daemon.log 2>/dev/null || true
          docker inspect pocketshell-test-agents-daemon > artifacts/docker/agents-daemon-inspect.json 2>/dev/null || true

      - name: Publish journey suite summary
        if: always()
        run: |
          if [[ -f artifacts/ci-journey/summary.md ]]; then
            cat artifacts/ci-journey/summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "# Per-push CI journey suite — summary"
              echo
              echo "No suite summary was written (the suite script may have aborted before writing it)."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Android test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          # Issue #835: per-shard name so matrix legs don't collide on upload.
          name: emulator-journey-android-test-reports-shard-${{ matrix.shard }}
          path: |
            **/build/reports/androidTests/
            **/build/outputs/androidTest-results/
            **/build/outputs/connected_android_test_additional_output/
            artifacts/ci-journey/
            artifacts/ci-journey-attempt-1/
          if-no-files-found: ignore

      - name: Upload Docker logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          # Issue #835: per-shard name so matrix legs don't collide on upload.
          name: emulator-journey-docker-logs-shard-${{ matrix.shard }}
          path: artifacts/docker/
          if-no-files-found: ignore

      - name: Stop Docker fixture
        if: always()
        run: docker compose -f tests/docker/docker-compose.yml down --volumes --remove-orphans
