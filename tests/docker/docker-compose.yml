# Local convenience compose file for the SSH + tmux test targets.
#
# Used for manual smoke testing per docs/testing.md:
#   docker compose -f tests/docker/docker-compose.yml up -d sshd
#   ssh -i tests/docker/test_key -p 2222 -o StrictHostKeyChecking=no testuser@127.0.0.1
#
# Or to bring up the tmux-equipped variant on host port 2224:
#   docker compose -f tests/docker/docker-compose.yml up -d --build tmux
#   ssh -i tests/docker/test_key -p 2224 -o StrictHostKeyChecking=no testuser@127.0.0.1
#
# The Testcontainers-based integration tests in `shared/core-ssh` /
# `shared/core-tmux` build their own images and pick ephemeral ports — they
# don't use this compose file.
#
# Issue #150: every service ships an SSH-shaped healthcheck so callers can
# wait on `docker inspect --format='{{.State.Health.Status}}' <container>`
# instead of polling SSH with retry loops. The check runs from inside the
# container against `testuser@localhost` using `/root/test_key` (copied in
# by the Dockerfile), so it exercises the same auth path as a real client
# without depending on the host network.
x-ssh-healthcheck:
  &ssh-healthcheck
  test:
    - CMD-SHELL
    - >-
      ssh -o BatchMode=yes
      -o ConnectTimeout=2
      -o StrictHostKeyChecking=no
      -o UserKnownHostsFile=/dev/null
      -i /root/test_key
      testuser@localhost true
  interval: 2s
  timeout: 5s
  retries: 10
  start_period: 5s

services:
  sshd:
    build:
      context: .
      dockerfile: Dockerfile.ssh
    image: pocketshell-test:ssh
    container_name: pocketshell-test-ssh
    ports:
      - "2222:22"
    healthcheck: *ssh-healthcheck

  # `pocketshell-test:tmux` extends the base SSH image with tmux +
  # tmuxctl. Host port 2224 keeps it distinct from `sshd`'s 2222 so
  # both can run in parallel for manual testing.
  tmux:
    build:
      context: .
      dockerfile: Dockerfile.tmux
    image: pocketshell-test:tmux
    container_name: pocketshell-test-tmux
    depends_on:
      - sshd
    ports:
      - "2224:22"
    healthcheck: *ssh-healthcheck

  # Deterministic local target for emulator smoke tests. It exposes the
  # same SSH port as `sshd`; run one or the other, not both:
  #   docker compose -f tests/docker/docker-compose.yml up -d --build agents
  #
  # Issue #724 (agents-fixture pool): this service is bringable up as N
  # ISOLATED instances on distinct host ports so parallel emulator lanes each
  # get their OWN SSH/tmux fixture and never share tmux state. Two knobs make
  # that work, BOTH defaulted so the single-lane path is byte-for-byte unchanged:
  #
  #   * AGENTS_HOST_PORT  — host port to publish (default 2222). A lane sets its
  #     claimed port, e.g. AGENTS_HOST_PORT=2243.
  #   * AGENTS_CONTAINER_NAME — the daemon-global container name (default
  #     `pocketshell-test-agents`, kept so the existing single-lane
  #     `docker inspect pocketshell-test-agents` diagnostics still resolve). A
  #     fixed name is global to the Docker daemon and ignores the compose
  #     project, so two concurrent `docker compose up` invocations would COLLIDE
  #     on it; a lane therefore overrides it to a per-lane name (e.g.
  #     `pocketshell-test-agents-2243`) AND runs under a distinct
  #     COMPOSE_PROJECT_NAME. With both overridden, lanes are fully independent.
  #
  # Bring up one lane (the lane allocator does this for you):
  #   COMPOSE_PROJECT_NAME=psagents2243 \
  #     AGENTS_HOST_PORT=2243 AGENTS_CONTAINER_NAME=pocketshell-test-agents-2243 \
  #     docker compose -f tests/docker/docker-compose.yml up -d --build agents
  # Tear it down:
  #   COMPOSE_PROJECT_NAME=psagents2243 \
  #     AGENTS_HOST_PORT=2243 AGENTS_CONTAINER_NAME=pocketshell-test-agents-2243 \
  #     docker compose -f tests/docker/docker-compose.yml down -v
  agents:
    build:
      context: ../..
      dockerfile: tests/docker/Dockerfile.agents
    image: pocketshell-test:agents
    container_name: ${AGENTS_CONTAINER_NAME:-pocketshell-test-agents}
    ports:
      - "${AGENTS_HOST_PORT:-2222}:22"
    healthcheck: *ssh-healthcheck

  # Issue #847: agents fixture whose host `pocketshell` CLI is OLDER than the
  # Android client — it lacks the new-in-0.4.10 `tree` / `agents kind`
  # subcommands, reproducing the maintainer's 0.4.9-host scenario that made
  # v0.4.10 hang on "loading tree". Bound on host port 2238 (distinct from
  # `agents`/2222, `tmux`/2224, `flaky-agent`/2226, bootstrap/2230-2236,
  # `real-agent`/2240, agents-pool/2243-2245). A connected test against this
  # fixture asserts the client connects + renders the LIVE tree on a CLI
  # mismatch instead of hanging. NOT started by the default workflow; the
  # connected test that uses it is gated accordingly.
  agents-old-cli:
    build:
      context: ../..
      dockerfile: tests/docker/Dockerfile.agents-old-cli
    image: pocketshell-test:agents-old-cli
    container_name: pocketshell-test-agents-old-cli
    # Issue #847: the image reports an OLDER `pocketshell --version` (0.4.9, baked
    # into /opt/pocketshell-agent-fixture-version via the OLD_CLI_FIXTURE_VERSION
    # build arg) than the app, so the bootstrap "Host setup needed" sheet appears
    # on connect — the maintainer's 0.4.9-host scenario. Tapping Skip on that
    # sheet RELEASES the warm `warm-host-connect` lease, the #847 timeout-
    # inversion trigger the connected journey test
    # (FolderListBootstrapSkipTreeLoadsDockerTest) exercises. The `tree` /
    # `agents kind` commands are still rejected (old CLI), so the existing
    # FolderListOldCliHydrateDockerTest is unaffected.
    ports:
      - "2238:22"
    healthcheck: *ssh-healthcheck

  # Issue #839: agents fixture whose host `pocketshell` is the REAL Python
  # package (genuine `tree.py` daemon code), so `tree get|upsert|reconcile`
  # actually PERSIST to a host-side JSON registry under
  # `$XDG_STATE_HOME/pocketshell/tree/registry.json` (atomic temp-file +
  # os.replace, 0600). That host-side state SURVIVES an Android app kill +
  # relaunch — the #837 durable-tree property. The connected journey
  # (FolderListDurableTreeDaemonDockerTest) collapses a folder + holds an order,
  # KILLS + RELAUNCHES the app (a fresh FolderListViewModel + a NEW
  # TreeRemoteSource binding the same host over a NEW SSH session), and asserts
  # the cold-start hydrate reads the held order/collapse back INSTANTLY, then a
  # reconcile diffs the registry against the LIVE `tmuxctl list` and returns
  # gone/added deltas. Bound on host port 2239 (distinct from `agents`/2222,
  # `tmux`/2224, `flaky-agent`/2226, bootstrap/2230-2236, `agents-old-cli`/2238,
  # `real-agent`/2240, agents-pool/2243-2245). NOT started by the default
  # workflow; the connected test that uses it is gated accordingly (Assume).
  agents-daemon:
    build:
      context: ../..
      dockerfile: tests/docker/Dockerfile.agents-daemon
    image: pocketshell-test:agents-daemon
    container_name: pocketshell-test-agents-daemon
    ports:
      - "2239:22"
    healthcheck: *ssh-healthcheck

  # Issue #632 (slice 2): the 7 bootstrap setup-detection fixtures bind disjoint
  # host ports 2230-2236, so they can be sharded across multiple emulators and
  # brought up concurrently under DISTINCT compose projects
  # (COMPOSE_PROJECT_NAME). They deliberately carry NO `container_name:` — a
  # fixed container name is global to the Docker daemon and ignores the compose
  # project, which would make two concurrent `docker compose up` invocations
  # collide on the same name. Without it, compose namespaces each container as
  # `<project>_bootstrap-<scenario>_<n>`, so parallel shards don't conflict.
  # Callers address these fixtures by host port, never by container name.
  bootstrap-ready:
    build:
      context: .
      dockerfile: Dockerfile.bootstrap
      args:
        SCENARIO: ready
    image: pocketshell-test:bootstrap-ready
    ports:
      - "2230:22"
    healthcheck: *ssh-healthcheck

  bootstrap-uv-install:
    build:
      context: .
      dockerfile: Dockerfile.bootstrap
      args:
        SCENARIO: uv-install
    image: pocketshell-test:bootstrap-uv-install
    ports:
      - "2231:22"
    healthcheck: *ssh-healthcheck

  bootstrap-uv-upgrade:
    build:
      context: .
      dockerfile: Dockerfile.bootstrap
      args:
        SCENARIO: uv-upgrade
    image: pocketshell-test:bootstrap-uv-upgrade
    ports:
      - "2236:22"
    healthcheck: *ssh-healthcheck

  bootstrap-unsupported:
    build:
      context: .
      dockerfile: Dockerfile.bootstrap
      args:
        SCENARIO: unsupported
    image: pocketshell-test:bootstrap-unsupported
    ports:
      - "2232:22"
    healthcheck: *ssh-healthcheck

  bootstrap-daemon-disabled:
    build:
      context: .
      dockerfile: Dockerfile.bootstrap
      args:
        SCENARIO: daemon-disabled
    image: pocketshell-test:bootstrap-daemon-disabled
    ports:
      - "2233:22"
    healthcheck: *ssh-healthcheck

  bootstrap-user-local-path:
    build:
      context: .
      dockerfile: Dockerfile.bootstrap
      args:
        SCENARIO: user-local-path
    image: pocketshell-test:bootstrap-user-local-path
    ports:
      - "2234:22"
    healthcheck: *ssh-healthcheck

  bootstrap-fish-user-local-path:
    build:
      context: .
      dockerfile: Dockerfile.bootstrap
      args:
        SCENARIO: user-local-path
        INSTALL_FISH: "true"
        LOGIN_SHELL: /usr/bin/fish
    image: pocketshell-test:bootstrap-fish-user-local-path
    ports:
      - "2235:22"
    healthcheck: *ssh-healthcheck

  # Issue #1236 (D26): a host with tmux + the pocketshell CLI ready but the
  # agent stop/idle notification hooks NOT installed — a SILENT host under D21.
  # Seeds a pre-existing foreign Claude hook so the bootstrap `hooks install`
  # can be asserted to MERGE non-destructively. Bound on host port 2241
  # (distinct from the other bootstrap variants 2230-2236, old-cli 2238,
  # daemon 2239, real-agent 2240).
  bootstrap-notifications:
    build:
      context: .
      dockerfile: Dockerfile.bootstrap
      args:
        SCENARIO: notifications
    image: pocketshell-test:bootstrap-notifications
    ports:
      - "2241:22"
    healthcheck: *ssh-healthcheck

  # Issue #145: deterministic mid-session disconnect fixture. Every
  # accepted interactive SSH session (TmuxClient shell channel) is
  # wrapped in a ForceCommand watcher that kills the SSH child after
  # `FLAKY_DISCONNECT_AFTER_SEC` seconds (default 8 in the Dockerfile,
  # overridden to 12 here so the PocketShell tmux attach handshake has
  # room to land before the blip). Non-interactive `session.exec(cmd)`
  # probes (used by the host picker's `tmuxctl list` / `tmux
  # list-sessions` calls) skip the timer entirely so the picker probes
  # stay fast. The container entrypoint seeds a long-lived `flaky-main`
  # tmux session so the picker's first SSH probe lists it immediately.
  # Bound on host port 2226 (distinct from `agents`/2222, `tmux`/2224,
  # bootstrap variants/2230-2236).
  flaky-agent:
    build:
      context: .
      dockerfile: flaky-agent/Dockerfile
    image: pocketshell-test:flaky-agent
    container_name: pocketshell-test-flaky-agent
    environment:
      FLAKY_DISCONNECT_AFTER_SEC: "12"
      FLAKY_SEEDED_SESSION_NAME: "flaky-main"
    ports:
      - "2226:22"
    # The flaky-agent watcher kills *interactive* sessions after
    # FLAKY_DISCONNECT_AFTER_SEC seconds; non-interactive `exec` probes
    # (like the `true` healthcheck) skip the watcher entirely, so the
    # standard SSH healthcheck still settles to `healthy` reliably.
    healthcheck: *ssh-healthcheck

  # Issue #342: opt-in network fault proxy for connected Android proof tests.
  # The emulator reaches the proxy at 10.0.2.2:2228, while the proxy forwards
  # to the normal `agents` SSH fixture on the compose network. Tests control
  # toxics through the HTTP API exposed on 10.0.2.2:8474.
  #
  # The default GitHub workflow does not start this service, so the Android
  # tests that use it are gated with `pocketshellNetworkFaultProofs=true` and
  # skipped on CI unless the workflow is explicitly expanded later.
  network-fault-proxy:
    image: ghcr.io/shopify/toxiproxy:2.9.0
    container_name: pocketshell-test-network-fault-proxy
    command: ["-host", "0.0.0.0"]
    depends_on:
      - agents
    ports:
      - "2228:2228"
      - "8474:8474"

  # Issue #346: true packet-loss proxy for opt-in connected Android proofs.
  # The emulator reaches this proxy at 10.0.2.2:2229. Linux `tc netem loss`
  # runs inside the Docker proxy container, not on the host or emulator
  # network, which avoids the instrumentation process-kill behavior reproduced
  # by the earlier host/Android netem attempt.
  #
  # This service is intentionally not part of the default GitHub workflow. The
  # proof test is gated by `pocketshellNetworkFaultProofs=true` and skipped on
  # CI unless the workflow starts this service explicitly in a future change.
  packet-loss-proxy:
    build:
      context: .
      dockerfile: packet-loss-proxy/Dockerfile
    image: pocketshell-test:packet-loss-proxy
    container_name: pocketshell-test-packet-loss-proxy
    cap_add:
      - NET_ADMIN
    environment:
      PACKET_LOSS_RATE: "5%"
      PACKET_LOSS_LISTEN_PORT: "2229"
      PACKET_LOSS_TARGET_HOST: agents
      PACKET_LOSS_TARGET_PORT: "22"
    depends_on:
      - agents
    ports:
      - "2229:2229"
